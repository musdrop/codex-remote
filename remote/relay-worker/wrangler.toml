name = "codex-remote-relay"
main = "src/worker.mjs"
compatibility_date = "2026-06-01"

# 如需自定义域名，可在 Cloudflare 控制台绑定，或取消下面示例注释并改成自己的域名。
routes = [{ pattern = "relay.musdrop.top/*", zone_name = "musdrop.top" }]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RelayRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayRoom"]
