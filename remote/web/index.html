    }
    box.appendChild(row);
  }
}

// 分块上传（image.fetch 的镜像：单块 ≤96k base64 字符，远小于 relay 帧上限）
async function uploadImage(a) {
  const id = crypto.randomUUID().replace(/-/g, "").slice(0, 16);
  const CHUNK = 96000;
  for (let o = 0; o < a.b64.length; o += CHUNK) {
    await app.session.request("image.push", {
      id,
      mime: a.mime,
      data: a.b64.slice(o, o + CHUNK),
      eof: o + CHUNK >= a.b64.length,
    }, 30000);
  }
  return id;
}

async function stopTurn() {
  if (!app.currentId) return;
  // 即时反馈：真正的停止确认要等 turn 结束事件，期间按钮置灰、提示"正在停止"
  $("stop").disabled = true;
  $("runhint").innerHTML = '<span class="pulse"></span>正在停止…';
  $("runhint").style.display = "block";
  try {
    const r = await app.session.request("turn.interrupt", { sessionId: app.currentId });
    if (!r.ok && r.reason) showBanner(`停止未生效：${r.reason}`);
  } catch (err) {
    showBanner(`停止失败：${err.message}`);
  } finally {
    $("stop").disabled = false;
  }
}

// 新建会话：从最近会话提取常用目录列表，点选即建，手输仅作兜底
function newSession() {
  if (net.link !== "ok" || net.daemon === false) {
    showBanner("电脑离线，暂时无法新建会话");
    return;
  }
  const dirs = [];
  const seen = new Set();
  for (const s of app.lastSessions) {
    const cwd = (s.cwd || "").trim();
    if (!cwd || seen.has(cwd)) continue;
    seen.add(cwd);
    dirs.push(cwd);
    if (dirs.length >= 8) break;
  }
  const box = $("dirlist");
  box.innerHTML = "";
  const addRow = (title, sub, onclick) => {
    const row = document.createElement("div");
    row.className = "drow";
    const main = document.createElement("div");
    main.className = "dname";
    const t = document.createElement("div");
    t.textContent = title;
    main.appendChild(t);
    if (sub) {
      const d = document.createElement("div");
      d.className = "dsub";
      d.textContent = sub;
      main.appendChild(d);
    }
    row.appendChild(main);
    row.onclick = onclick;
    box.appendChild(row);
  };
  for (const dir of dirs) {
    addRow(dir.split(/[\\/]/).pop() || dir, dir, () => createSession(dir));
  }
  addRow("默认目录", "由电脑端决定", () => createSession(undefined));
  addRow("其他目录…", "手动输入完整路径", () => {
    $("dirsheet").classList.remove("open");
    const cwd = prompt("工作目录完整路径：", "");
    if (cwd === null) return;
    createSession(cwd.trim() || undefined);
  });
  $("dirsheet").classList.add("open");
}

async function createSession(cwd) {
  $("dirsheet").classList.remove("open");
  showBanner("正在新建会话，可能需要几秒…");
  try {
    const res = await app.session.request("session.new", { cwd }, 90000);
    if (res.threadId) {
      showBanner("");
      openSession(res.threadId, "新会话", { fresh: true });
    } else {
      showBanner("新建会话失败：未返回会话 id");
    }
  } catch (err) {
    showBanner(`新建失败：${err.message}`);
  }
}

// —— 审批：当前会话内嵌对话流，其余全局置顶；任一设备处理后各端同步消失 ——
let titleBlink = null;
function updateTitleBlink() {
  const n = app.approvals.size;
  if (n > 0 && !titleBlink) {
    let flip = false;
    titleBlink = setInterval(() => {
      flip = !flip;
      document.title = flip ? `（${app.approvals.size} 个审批）Codex-叉叉` : "Codex-叉叉";
    }, 1200);
  } else if (n === 0 && titleBlink) {
    clearInterval(titleBlink);
    titleBlink = null;
    document.title = "Codex-叉叉";
  }
}

// 高危命令特征：不可逆删除 / 强推 / 提权。命中则红框警示，且不提供"本会话内放行"
const DANGER_RE = /\brm\s+(-[a-z]*\s+)*-[a-z]*r[a-z]*f|\bgit\s+push\s+.*--force\b|\bsudo\b|\bmkfs\b|\bdd\s+if=/i;

function buildApprovalCard(p) {
  const card = document.createElement("div");
  card.className = "approval";
  card.dataset.key = p.approvalKey;
  const title = document.createElement("div");
  title.className = "atitle";
  const sname = app.sessionNames.get(p.sessionId) || "会话";
  const kind = p.kind === "fileChange" ? "请求修改文件" : "请求执行命令";
  title.textContent = p.sessionId === app.currentId && app.view === "session"
    ? kind : `${sname} · ${kind}`;
  const cmdText = Array.isArray(p.command) ? p.command.join(" ") : (p.command || p.reason || "（详情见电脑端）");
  const dangerous = p.kind !== "fileChange" && DANGER_RE.test(cmdText);
  const body = document.createElement("div");
  body.className = `acmd${dangerous ? " danger" : ""}`;
  if (p.kind === "fileChange" && Array.isArray(p.files) && p.files.length) {
    appendDiffFiles(body, p.files); // 文件审批：直接看 diff，不再是"详情见电脑端"
  } else {
    body.textContent = cmdText;
  }
  const btns = document.createElement("div");
  btns.className = "abtns";
  const decide = async (decision) => {
    app.approvals.delete(p.approvalKey);
    renderApprovals();
    try {
      const r = await app.session.request("approval.respond", { approvalKey: p.approvalKey, decision });
      if (!r.ok && r.reason) showBanner(`审批未生效：${r.reason}`);
    } catch (err) {
      showBanner(`审批失败：${err.message}`);
    }
  };
  const yes = document.createElement("button");
  yes.className = "ayes"; yes.textContent = "批准";
  yes.onclick = () => decide("accept");
  const no = document.createElement("button");
  no.className = "ano"; no.textContent = "拒绝";
  no.onclick = () => decide("decline");
  btns.append(yes, no);
  card.append(title, body);
  if (p.cwd) {
    const cwd = document.createElement("div");
    cwd.className = "acwd";
    cwd.textContent = `目录：${p.cwd}`;
    card.appendChild(cwd);
  }
  if (dangerous) {
    const warn = document.createElement("div");
    warn.className = "adanger";
    warn.textContent = "⚠ 此命令不可逆或涉及高权限，请确认后再批准";
    card.appendChild(warn);
  }
  card.appendChild(btns);
  if (!dangerous && p.kind !== "fileChange") {
    const all = document.createElement("button");
    all.className = "aall";
    all.textContent = "批准，且本会话内不再询问";
    all.onclick = () => decide("acceptForSession");
    card.appendChild(all);
  }
  return card;
}

// 统一重绘所有待审批卡：当前会话的插入对话流末尾，其余置顶全局区
function renderApprovals() {
  const stick = nearBottom(); // 正在翻历史时不拽走用户，靠状态条与标题提醒
  $("approvals").innerHTML = "";
  document.querySelectorAll("#log .approval").forEach((n) => n.remove());
  let inlined = false;
  for (const p of app.approvals.values()) {
    const card = buildApprovalCard(p);
    if (app.view === "session" && p.sessionId === app.currentId) {
      $("log").appendChild(card);
      inlined = true;
    } else {
      $("approvals").appendChild(card);
    }
  }
  if (inlined && stick) scrollToBottom();
  updateJump();
  updateTitleBlink();
  updateStatusStrip();
}

function showApproval(p) {
  if (app.approvals.has(p.approvalKey)) return;
  app.approvals.set(p.approvalKey, p);
  renderApprovals();
  try { navigator.vibrate?.([180, 90, 180]); } catch {}
}

function resolveApproval(approvalKey) {
  if (!app.approvals.delete(approvalKey)) return;
  renderApprovals();
}

// —— 过程组：一轮任务的中间步骤收纳成可折叠容器 ——
// task_started 记开组状态（DOM 到第一条过程行才挂载，因为 rollout 里它先于
// user_message），中间的工具调用/文件改动/过渡性回复都进组（运行中保持摊开，
// 实时可见）；task_complete 收组：末尾的助手消息是本轮结论，挪到组外常显，
// 其余收拢成一行摘要（"处理了 X 分 X 秒"）。快照回放走同一条路，历史轮次直接呈收拢态。
function itemTs(item) {
  const t = Date.parse(item?.timestamp ?? "");
  return Number.isFinite(t) ? t : null;
}

function procStart(item) {
  if (app.proc) procFinish(null); // 上一轮没等到收尾事件（截断/异常）：先按现状收拢
  // 容器不在此刻挂：rollout 里 task_started 先于 user_message，现在挂 DOM 会跑到
  // 用户气泡上面。先记起始信息，等第一条过程行到达时再挂载（ensureProc）。
  app.proc = {
    wrap: null, body: null, label: null, count: 0,
    live: !!item, // task_started 开的组；false=快照截断/旧格式的懒开组（不确定是否在跑）
    startTs: itemTs(item) ?? (item?.payload?.started_at ? item.payload.started_at * 1000 : null),
  };
}

function ensureProc(mount) {
  if (!app.proc) procStart(null);
  const p = app.proc;
  if (p.wrap) return p;
  const wrap = document.createElement("div");
  wrap.className = "proc open" + (p.live ? " running" : "");
  const head = document.createElement("div");
  head.className = "proc-head";
  const chev = document.createElement("span");
  chev.className = "pchev";
  chev.textContent = "▶";
  const label = document.createElement("span");
  label.textContent = p.live ? "正在处理…" : "处理过程";
  head.append(chev, label);
  const body = document.createElement("div");
  body.className = "proc-body";
  head.onclick = () => wrap.classList.toggle("open");
  wrap.append(head, body);
  mount.appendChild(wrap);
  Object.assign(p, { wrap, body, label, at: Date.now() });
  return p;
}

function procFinish(item, aborted = false) {
  const p = app.proc;
  app.proc = null;
  if (!p?.wrap) return; // 从未挂载（纯回复轮或空组）：无痕清掉
  p.wrap.classList.remove("running");
  // 组内末尾的助手消息是本轮最终回复，属于结论不属于过程：挪到组外常显
  const last = p.body.lastElementChild;
  if (last?.classList.contains("assistant")) p.wrap.after(last);
  if (!p.body.childElementCount) { p.wrap.remove(); return; } // 纯回复轮（无步骤）：不留空壳
  const endTs = itemTs(item);
  const ms = p.startTs != null && endTs != null ? endTs - p.startTs : null;
  const steps = p.count || p.body.childElementCount; // 只剩输出/截断占位时也别显示"0 步"
  p.label.textContent = aborted
    ? `已中断（执行了 ${steps} 步）`
    : ms != null && ms >= 1000 ? `处理了 ${fmtDur(ms)}` : `执行了 ${steps} 步`;
  // 用户不在底部且过程区正在视口里（多半在回看输出）：不自动收，免得内容被抽走；
  // 头部摘要已就位，随时可手动收。批量回填（组还在 fragment 里）rect 全 0，恒收拢。
  // 「在读」还要求组挂载已超过几秒：快照分块是毫秒级连发，跨块的历史轮次会在
  // 视口/滚动条件上误判成在读（块间视口恰好停在组上），刚挂载的组一律照常收拢。
  const r = p.wrap.getBoundingClientRect();
  const reading = Date.now() - p.at > 3000
    && !nearBottom() && r.bottom > 0 && r.top < window.innerHeight && r.height > 0;
  if (!reading) p.wrap.classList.remove("open");
}

function renderInto(items) {
  // 回放（从头读）：新内容追加在下方，读者自己往下滚，绝不替他跳到末尾
  const stick = !app.replayMode && nearBottom();
  const frag = document.createDocumentFragment();
  // 过程行进组、对话行进 frag；组容器在第一条过程行到达时才挂载（ensureProc），
  // 没开组时懒开一个（快照从轮次中间截断时也能在 task_complete 收拢）
  const sink = (node, toProc) => {
    if (toProc) ensureProc(frag).body.appendChild(node);
    else frag.appendChild(node);
  };
  for (const item of items) {
    // 轮次事件驱动运行状态（顺序处理，快照回放后落在正确的最终状态）
    if (item?.type === "event_msg") {
      const pt = item.payload?.type;
      if (pt === "task_started") { tailRunning(true, item.payload?.started_at); procStart(item); }
      else if (pt === "task_complete") { procFinish(item); tailRunning(false); refreshTitle(); }
      else if (pt === "turn_aborted") { procFinish(item, true); tailRunning(false); }
      else if (pt === "token_count") setCtx(item.payload?.info);
    }
    const bubble = itemToBubble(item);
    if (!bubble) continue;
    let node = null;
    let toProc = false;
    if (bubble.cls === "user") {
      // 只收"已有内容"的组（旧格式无轮次事件时靠这里收拢上一轮）；
      // 本轮 task_started 刚记下的未挂载组要留着——它属于这条用户消息开启的轮次
      if (app.proc?.wrap) procFinish(null);
      consumeEcho(bubble.text); // tail 确认，撤下乐观气泡
      node = bubbleNode(bubble);
    } else if (bubble.cls === "assistant") {
      endStream(); // tail 的完整消息到了，撤下流式草稿
      node = bubbleNode(bubble);
      toProc = !!app.proc; // 先随过程进组（含开头的过渡文字）；本轮最终回复由 procFinish 挪出组外
    } else if (bubble.cls === "tool") {
      node = toolRow(bubble);
      toProc = true;
      ensureProc(frag).count++;
    } else if (bubble.cls === "toolout") {
      node = attachToolOutput(bubble); // 通常并入已有调用行，返回 null
      toProc = true;
    } else if (bubble.cls === "diff") {
      node = diffNode(bubble);
      toProc = true;
      ensureProc(frag).count++;
    } else if (bubble.cls === "images") {
      if (bubble.user) consumeImgEcho(); // 纯图片消息的乐观气泡在此确认
      node = imagesNode(bubble); // 生成图是结果产物，留在组外常显
    } else if (bubble.cls === "trunc") {
      node = document.createElement("div");
      node.className = "trunc";
      node.textContent = "· 此条内容过长已截断，请在电脑端查看 ·";
      toProc = !!app.proc; // 截断占位跟随上下文：在过程里就进组，不在就独立展示
    }
    if (node) sink(node, toProc);
  }
  // 有真实内容渲染时，清掉"新会话"空态提示（否则增量消息会追加在它下面）
  if (frag.firstChild) $("emptyhint")?.remove();
  $("log").appendChild(frag);
  if (stick) scrollToBottom();
  updateJump();
}

// —— 流式草稿：session.live 的 agent message delta 即时预览 ——
// 正式内容以 rollout tail 为准；tail 的 agent_message 到达即替换草稿
function appendStream(delta) {
  if (app.view !== "session") return;
  if (!app.stream) {
    const el = document.createElement("div");
    el.className = "msg assistant streaming";
    const raw = document.createElement("span");
    raw.className = "raw";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    el.append(raw, cursor);
    const stick = nearBottom();
    $("log").appendChild(el);
    if (stick) scrollToBottom();
    app.stream = { el, raw, text: "" };
  }
  const stick = nearBottom();
  app.stream.text += delta;
  app.stream.raw.textContent = clip(app.stream.text);
  if (stick) scrollToBottom();
}

function endStream() {
  app.stream?.el.remove();
  app.stream = null;
}

// —— 下拉加载更早历史 ——
// 顶部还有更早的 rollout（daemon 快照只回填末尾一段，total > 已加载 histLimit）
function hasEarlier() {
  return app.histTotal > app.histLimit;
}
// 下拉手势参数：需要一段刻意的行程才触发，避免误触/过快触发
const PULL_MAX = 100;      // 提示条最大视觉高度
const PULL_TRIGGER = 64;   // 达到此高度松手即加载
const PULL_DEADZONE = 12;  // 起手空程：前 12px 不撑高，滤掉抖动
const PULL_FACTOR = 78;    // 阻尼系数：越大越"沉"，需拉更远
// 渐进阻尼（橡皮筋）：手指行程 dy → 提示条高度，越拉越沉、趋近 PULL_MAX
function pullResist(dy) {
  const over = dy - PULL_DEADZONE;
  if (over <= 0) return 0;
  return PULL_MAX * (1 - 1 / (1 + over / PULL_FACTOR));
}
function setPullTip(h, text, ready) {
  const t = $("pulltip");
  t.querySelector(".txt").textContent = text || "";
  t.classList.toggle("ready", !!ready);
  t.style.height = `${h}px`;
}
function resetPullTip() {
  const t = $("pulltip");
  t.classList.remove("drag", "ready", "loading", "end");
  t.style.height = "0px";
}
// 快照/其余分片可能分多条 notify 到达，防抖到齐后再一次性锚定滚动
function scheduleEarlierSettle() {
  clearTimeout(app.earlierTimer);
  app.earlierTimer = setTimeout(() => {
    const a = app.earlierAnchor;
    if (a) {
      const log = $("log");
      // 旧内容（含末尾乐观气泡）重渲染后位于末尾 a.count 个节点；旧首节点 = 第 (newCount - a.count) 个
      const idx = Math.max(0, log.childElementCount - a.count);
      const anchor = log.children[idx];
      if (anchor) {
        const delta = anchor.getBoundingClientRect().top - a.top;
        if (delta) window.scrollBy(0, delta); // 把用户原本在看的内容钉回原位，更早历史长在上面
      }
    }
    clearTimeout(app.earlierFailsafe);
    app.loadingEarlier = false;
    app.earlierAnchor = null;
    resetPullTip();
    updateJump();
  }, 90);
}
function loadEarlier() {
  if (app.loadingEarlier || !hasEarlier() || !app.session) return;
  const tip = $("pulltip");
  // 先把提示瞬间收平（drag 关过渡），再量锚点，确保与 settle 时的布局一致
  tip.classList.add("drag");
  tip.style.height = "0px";
  const log = $("log");
  const first = log.firstElementChild;
  app.earlierAnchor = {
    count: log.childElementCount,
    top: first ? first.getBoundingClientRect().top : 0,
  };
  tip.classList.remove("drag");
  app.loadingEarlier = true;
  app.histLimit = Math.min(5000, app.histLimit + 200);
  showToast("加载更早历史…", 4000);
  clearTimeout(app.earlierFailsafe);
  app.earlierFailsafe = setTimeout(() => {
    if (app.loadingEarlier) { app.loadingEarlier = false; app.earlierAnchor = null; resetPullTip(); }
  }, 8000);
  app.session.request("session.more", { limit: app.histLimit }).catch((e) => {
    clearTimeout(app.earlierFailsafe);
    app.loadingEarlier = false;
    app.earlierAnchor = null;
    resetPullTip();
    showBanner(`加载更早失败：${e.message}`);
  });
}
// 加载完成/首屏后：无更早历史时不必提示（提示只在下拉手势中出现）
function updateEarlierHint() {
  if (!hasEarlier() && !app.loadingEarlier) resetPullTip();
}

// —— 回放翻页（观众看已结束的会话）——
// 阅读方向与"追直播"相反：从头往后读，底部哨兵进入视口即继续加载下一段，
// 内容以 session.event 追加到末尾。客户端自限 ≥2s，与 daemon 的 viewer 频控对齐。
function updateReplayMore() {
  const el = $("replaymore");
  el.classList.toggle("show", app.replayMode && !app.replayDone);
  el.textContent = "继续加载…";
}
async function loadReplayMore() {
  if (!app.replayMode || app.replayDone || app.replayLoading || !app.session) return;
  const wait = 2000 - (Date.now() - app.replayLastAt);
  if (wait > 0) {
    clearTimeout(app.replayRetry);
    app.replayRetry = setTimeout(loadReplayMore, wait + 50);
    return;
  }
  app.replayLastAt = Date.now();
  app.replayLoading = true;
  try {
    const r = await app.session.request("session.more", { limit: 200 });
    if (typeof r?.total === "number") app.histTotal = r.total;
    if (r?.done) app.replayDone = true;
  } catch {
    // 频控/瞬断：哨兵仍在，滚动触达时自然重试
  } finally {
    app.replayLoading = false;
    updateReplayMore();
    // 哨兵仍在视口内（短会话/大屏）：继续拉，直到读完或哨兵滚出视口
    if (app.replayMode && !app.replayDone && replaySentinelVisible) {
      clearTimeout(app.replayRetry);
      app.replayRetry = setTimeout(loadReplayMore, 2100);
    }
  }
}
let replaySentinelVisible = false;
function bindReplaySentinel() {
  const io = new IntersectionObserver((entries) => {
    replaySentinelVisible = entries.some((e) => e.isIntersecting);
    if (replaySentinelVisible) loadReplayMore();
  });
  io.observe($("replaymore"));
}

// 触摸下拉手势：仅在会话顶部起手，下拉过阈值松手即加载更早
function bindPullToLoad() {
  const viewer = $("viewer");
  let pull = null;
  viewer.addEventListener("touchstart", (e) => {
    // 回放模式从头读起，没有"更早"可加载（翻页在底部哨兵）
    if (app.view !== "session" || app.replayMode || app.loadingEarlier || window.scrollY > 0) { pull = null; return; }
    pull = { startY: e.touches[0].clientY, ready: false };
  }, { passive: true });
  viewer.addEventListener("touchmove", (e) => {
    if (!pull) return;
    if (window.scrollY > 0) { pull = null; resetPullTip(); return; } // 已经滚离顶部：交回普通滚动
    const dy = e.touches[0].clientY - pull.startY;
    if (dy <= 0) { pull.ready = false; resetPullTip(); return; }
    const dist = pullResist(dy);   // 渐进阻尼，越拉越沉
    const t = $("pulltip");
    t.classList.add("drag");
    const canLoad = hasEarlier();
    const ready = canLoad && dist >= PULL_TRIGGER;
    if (!canLoad) t.classList.add("end"); else t.classList.remove("end");
    setPullTip(dist, !canLoad ? "已经到最开头了" : ready ? "松手加载更早" : "下拉加载更早", ready);
    pull.ready = ready;
  }, { passive: true });
  const finish = () => {
    if (!pull) return;
    const doLoad = pull.ready;
    pull = null;
    $("pulltip").classList.remove("drag", "ready");
    if (doLoad) loadEarlier();   // loadEarlier 会瞬间收平提示并弹出加载 toast
    else resetPullTip();          // 未过阈值：带过渡地回弹到 0，清掉 ready/end
  };
  viewer.addEventListener("touchend", finish, { passive: true });
  viewer.addEventListener("touchcancel", finish, { passive: true });
}

// live 事件：内容以 rollout tail（snapshot/event）为准；live 负责运行状态、
// 失败提示与 agent message delta 的流式预览（tail 到达即替换，不重复渲染）
function onLive(event, params) {
  if (event === "turn/started") { setRunning(true, "daemon"); return; }
  if (event === "turn/completed") {
    setRunning(false);
    // 草稿保留到 tail 的完整消息到达（renderInto 里 endStream），只摘掉光标
    app.stream?.el.querySelector(".cursor")?.remove();
    refreshTitle();
    return;
  }
  const norm = String(event).toLowerCase().replace(/[/_.-]/g, "");
  if (norm.includes("turnfailed") || norm.includes("turnerror")) {
    setRunning(false);
    endStream();
    procFinish(null, true); // 失败的轮次 rollout 里未必有收尾事件，这里兜底收组
    showBanner("本轮执行失败。可重新发送，或查看电脑端日志");
    return;
  }
  if (norm.includes("turnaborted")) { setRunning(false); endStream(); procFinish(null, true); return; }
  if (norm.includes("agentmessage") && norm.includes("delta")) {
    const delta = params?.delta ?? params?.text ?? params?.chunk;
    if (typeof delta === "string" && delta) appendStream(delta);
  }
}

function handleNotify(msg) {
  if (msg.method === "session.snapshot" && msg.params.sessionId === app.currentId) {
    if (typeof msg.params.total === "number") app.histTotal = msg.params.total;
    $("log").innerHTML = "";
    app.toolNodes.clear();
    app.seenImages.clear(); // 快照重放会重发同批 imageRef
    app.stream = null; // 元素已随 log 清空
    app.proc = null;
    renderInto(msg.params.items);
    for (const e of app.echoes) $("log").appendChild(e.el); // 未被确认的乐观气泡重新挂上
    renderApprovals(); // snapshot 清空了 log，内嵌审批卡重挂
    if (!$("log").childElementCount) {
      // 新会话空态：给一句引导而不是一片空白（有 id，首条消息渲染时由 renderInto 清掉）
      $("log").innerHTML = '<div class="notice" id="emptyhint">这是一个新会话。在下方给 Codex 布置第一个任务，' +
        '例如："把 README 里的安装说明补全"。</div>';
    }
    // 加载更早触发的快照：不落底，等分片到齐后把滚动锚回原处；否则（首屏/重连）落底
    // 回放模式（从头读）：首屏就是开头，停在顶部开始阅读，不落底
    if (app.loadingEarlier) scheduleEarlierSettle();
    else if (app.replayMode) window.scrollTo(0, 0);
    else scrollToBottom();
    updateEarlierHint();
    updateReplayMore();
  } else if (msg.method === "session.event" && msg.params.sessionId === app.currentId) {
    renderInto(msg.params.items);
    if (app.loadingEarlier) scheduleEarlierSettle(); // 快照余下分片，继续等到齐
  } else if (msg.method === "session.live" && msg.params.sessionId === app.currentId) {
    onLive(msg.params.event, msg.params.params);
  } else if (msg.method === "approval.request") {
    if (app.isViewer) return; // 第二道保险：旧 daemon 可能没过滤，观众端不渲染审批
    showApproval(msg.params); // 全局：任何页面都显示
  } else if (msg.method === "approval.resolved") {
    if (app.isViewer) return;
    resolveApproval(msg.params.approvalKey); // 其他设备处理后同步消失
  } else if (msg.method === "board.changed") {
    if (app.isViewer) return; // 携带其他会话状态；观众运行态走 live/tail
    scheduleListRefresh(); // 列表状态随运行/审批变化刷新
    // 当前会话的 daemon 驱动状态以看板为准（覆盖 tail 推断）
    if (msg.params?.sessionId === app.currentId && app.view === "session") {
      if (msg.params.running) setRunning(true, "daemon");
      else if (app.driver === "daemon") setRunning(false);
    }
  } else if (msg.method === "viewer.count") {
    if (msg.params?.sessionId !== app.currentId) return;
    app.viewerCount = msg.params.count ?? 0;
    if (app.isViewer) {
      // 事件感的一半来自同伴在场（count 含自己）
      const others = Math.max(0, app.viewerCount - 1);
      $("vcount").textContent = others > 0 ? `同场 ${others} 人` : "";
    } else {
      updateStatusStrip(); // "N 人围观中"——声望感需要被分享者看见
      if (msg.params.congested && !app.congestedShown) {
        app.congestedShown = true;
        showBanner("围观人数较多，已优先保障你的操作", () => showBanner(""));
      } else if (!msg.params.congested && app.congestedShown) {
        app.congestedShown = false;
        showBanner("");
      }
    }
  } else if (msg.method === "share.reaction") {
    if (msg.params?.sessionId === app.currentId) floatReaction(msg.params.emoji, msg.params.count);
  } else if (msg.method === "share.summary") {
    if (app.isViewer) return;
    const p = msg.params ?? {};
    showBanner(`围观战报：${p.visitors} 人来过，峰值 ${p.peak} 人在线，${p.reactions} 次喝彩`,
      () => showBanner(""));
  } else if (msg.method === "daemon.status") {
    net.engine = msg.params?.engine ?? null; // 引擎掉线/恢复（分层诊断）
    updateStatusPill();
  }
}

// 喝彩飘浮：双端同款，锚在底栏上方随机横移，动画完自清
function floatReaction(emoji, count) {
  if (app.view !== "session") return;
  const el = document.createElement("span");
  el.className = "vfloat";
  el.textContent = emoji;
  if (count > 1) {
    const n = document.createElement("span");
    n.className = "vn";
    n.textContent = `×${count}`;
    el.appendChild(n);
  }
  el.style.left = `${Math.round(20 + Math.random() * 60)}%`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1700);
}

function autoGrow() {
  const el = $("input");
  el.style.height = "auto";
  // composer 还没显示时 scrollHeight 为 0（openSession 先填草稿后开卡片），
  // 这时不写死高度，交给 CSS 的 min-height，避免输入框被压成 0
  if (!el.scrollHeight) return;
  // 上限约四成屏高：写长任务描述不憋屈，超出后内部滚动
  el.style.height = `${Math.min(el.scrollHeight, Math.round(window.innerHeight * 0.4))}px`;
}

// —— 多电脑切换 ——
function updateChevron() {
  // 有配对就显示 ▾：单台时弹层也承担"添加/删除电脑"的管理入口
  $("chev").classList.toggle("show", listDaemons().length >= 1);
}

function removeDaemon(id) {
  const daemons = loadStore();
  delete daemons[id];
  localStorage.setItem("czr-daemons", JSON.stringify(daemons));
  updateChevron();
  openSheet(); // 重绘列表
}

function openSheet() {
  const daemons = listDaemons();
  if (!daemons.length) return; // 未配对时无从管理
  const active = app.session?.info.id;
  const box = $("daemonlist");
  box.innerHTML = "";
  for (const d of daemons) {
    const row = document.createElement("div");
    row.className = `drow${d.id === active ? " active" : ""}`;
    const dot = document.createElement("span"); dot.className = "ddot";
    const name = document.createElement("span"); name.className = "dname"; name.textContent = d.name || "电脑";
    row.append(dot, name);
    if (d.id === active) {
      const c = document.createElement("span"); c.className = "dcur"; c.textContent = "当前"; row.append(c);
    } else {
      row.onclick = () => { $("sheet").classList.remove("open"); switchDaemon(d.id); };
      // 删除本机的配对记录（换机/重装后清理残留；电脑侧撤销授权在电脑端做）
      const del = document.createElement("button");
      del.className = "ddel";
      del.textContent = "✕";
      del.setAttribute("aria-label", "删除这台电脑的配对记录");
      del.onclick = (e) => {
        e.stopPropagation();
        if (confirm(`删除「${d.name || "电脑"}」的配对记录？（仅从本手机移除，电脑端授权需在电脑上撤销）`)) {
          removeDaemon(d.id);
        }
      };
      row.appendChild(del);
    }
    box.appendChild(row);
  }
  const note = document.createElement("div");
  note.className = "sheetnote";
  note.textContent = "添加电脑：在新电脑上启用手机远程接管并生成配对链接，用本手机打开即可。";
  box.appendChild(note);
  $("sheet").classList.add("open");
}

async function switchDaemon(id) {
  const daemons = loadStore();
  const info = daemons[id];
  if (!info || info.id === app.session?.info.id) return;
  setActiveDaemon(id);
  // 拆掉当前连接与视图
  if (app.session) { app.session.closedByUser = true; app.session.ws?.close(); }
  Object.assign(net, { link: "connecting", daemon: null, engine: null, lastSeen: null });
  updateStatusPill();
  app.view = "list"; app.currentId = null;
  app.echoes = [];
  app.toolNodes.clear();
  app.seenImages.clear();
  app.stream = null;
  app.proc = null;
  app.filter = "";
  $("search").value = "";
  app.drafts.clear();
  $("input").value = "";
  setRunning(false);
  updateJump();
  app.approvals.clear();
  document.body.classList.remove("insession");
  $("viewer").classList.remove("active"); $("composer").classList.remove("active");
  $("back").style.display = "none"; $("log").innerHTML = "";
  renderApprovals();
  $("list").classList.remove("hidden");
  $("list").innerHTML = '<div class="notice">正在连接…</div>';
  startSession(info);
}

// 围观终态（被踢/链接过期/会话不存在）：中性文案，不渲染成报错；
// 身份栏与获客入口保留——被踢的瞬间恰是转化时机。
function showViewerEnded(reason) {
  if (app.viewerEnded) return; // 终态只进一次：watch 失败路径重连会反复到这里，防卡片堆叠
  app.viewerEnded = true;
  // 真终态：停掉连接层。被踢/403 路径 session 已 dead，但 watch 失败（会话
  // 404/超时）时连接还活着，不关掉就会无限重连、反复触发本函数
  if (app.session) {
    app.session.closedByUser = true;
    try { app.session.ws?.close(); } catch {}
  }
  // 打开已撤销/过期链接时鉴权失败发生在进会话视图之前（view 还是 list，
  // 显示「正在打开围观…」）：把壳切到会话区，终态卡与获客入口才看得见
  if (app.isViewer && app.view !== "session") {
    app.view = "session";
    $("list").classList.add("hidden");
    $("viewer").classList.add("active");
    $("composer").classList.add("active"); // 身份栏（获客入口）在 composer 里
    document.body.classList.add("insession");
  }
  app.replayMode = false;
  updateReplayMore();
  setRunning(false);
  try { sessionStorage.removeItem("czr-viewer"); } catch {}
  $("sstatus").style.display = "none";
  const card = document.createElement("div");
  card.className = "vend";
  const t = document.createElement("div");
  t.className = "vtitle";
  t.textContent = "围观已结束";
  const sub = document.createElement("div");
  sub.textContent = reason || "分享者已收回链接，或链接已到期。";
  card.append(t, sub);
  $("log").appendChild(card);
  $("status").textContent = "已结束";
  $("status").className = "";
}

// 令牌被电脑端撤销/失效（403）：终态。这台的设备令牌永远失效，清掉死记录，
// 有其它已配对电脑就切过去，否则回到未配对引导——而不是无限「重连中…」
function handleRevoked(info, err) {
  const name = info?.name || "电脑";
  removeDaemon(info.id); // 死令牌无留存价值（电脑端已撤销），从本机移除
  const next = loadDaemonInfo();
  if (next) {
    showBanner(`「${name}」已在电脑端移除本设备，已切到「${next.name || "电脑"}」`);
    startSession(next);
    return;
  }
  app.session = null;
  document.body.classList.remove("paired");
  setTitle("C叉叉");
  updateChevron();
  renderOnboarding();
  $("status").textContent = "未配对";
  $("status").className = "";
  showBanner(`「${name}」已在电脑端移除本设备，请重新扫码配对`);
}

// —— 启动会话（可反复调用以切换电脑）——
function startSession(info) {
  // 标题固定，电脑名走副标题（updateStatusPill）；未配对态没有底栏/菜单
  if (app.view === "list") setTitle("C叉叉");
  document.body.classList.add("paired");
  // 观众态：同一套页面按角色收掉操作性镶边（CSS body.viewer 作用域）
  app.isViewer = !!info.viewer;
  document.body.classList.toggle("viewer", app.isViewer);
  if (app.isViewer) {
    setTitle(info.sname || "围观");
    $("list").innerHTML = '<div class="notice">正在打开围观…</div>';
  }
  updateChevron();
  const session = new Session(info);
  app.session = session;
  app.models = null; // 模型列表随电脑走，切换后重新取
  session.onStatus = (patch) => {
    Object.assign(net, patch);
    updateStatusPill();
  };
  session.onNotify = handleNotify;
  // 观众的 403 不是"设备被移除"：进入"围观已结束"终态，不动 czr-daemons
  session.onAuthFail = (err) => {
    if (info.viewer) showViewerEnded();
    else handleRevoked(session.info, err);
  };
  session.onReady = async (auth) => {
    net.link = "ok";
    net.engine = auth?.engine ?? null;
    updateStatusPill();
    showBanner("");
    updateChevron();
    if (info.viewer) {
      // 观众无看板：鉴权即直进会话只读视图（会话 id/名以 daemon 为准，链接字段仅兜底）
      const sid = auth?.scope?.sessionId || info.sid;
      const name = auth?.sessionName || info.sname || "围观";
      if (!sid) { showViewerEnded("链接不完整，请向分享者重新索取。"); return; }
      try {
        if (app.view === "session" && app.currentId === sid) {
          // 重连恢复：重新 watch（回放态会从头重发首屏，v1 接受）。
          // 回放进度一并归零——daemon 端 offset 已重置，旧的 replayDone
          // 不清会把加载哨兵藏掉，观众永远翻不过首屏
          app.replayDone = false;
          app.replayLoading = false;
          app.replayLastAt = 0;
          const r = await session.request("session.watch", { sessionId: sid, fromStart: true });
          app.replayMode = r?.mode === "replay";
          if (typeof r?.total === "number") app.histTotal = r.total;
          updateReplayMore();
        } else {
          await openSession(sid, name, { viewer: true });
        }
      } catch {
        showViewerEnded("会话已不存在或暂不可用");
      }
      return;
    }
    prefetchModels(); // 静默：给模型胶囊补上电脑端默认模型号
    try {
      if (app.view === "session" && app.currentId) {
        // 重连后恢复当前会话的实时订阅
        await session.request("session.watch", { sessionId: app.currentId });
      } else {
        await refreshList();
        // 通知深链：连上后直达对应会话
        if (app.deepLink) {
          const id = app.deepLink;
          app.deepLink = null;
          openSession(id, app.sessionNames.get(id) || "会话");
        }
      }
    } catch (err) {
      showBanner(`加载失败：${err.message}`);
    }
  };
  session.start().catch((err) => showBanner(`连接失败：${err.message}`));
}

// —— 分享围观（创作者侧）——
// 决策：先展示该会话已存在的链接（时效/在线观众/复制/撤销），"再生成一条"是显式动作，
// 打开弹窗绝不铸造令牌。

function fmtExpiry(expiresAt) {
  if (!expiresAt) return "永久";
  const left = expiresAt - Date.now();
  if (left <= 0) return "已过期";
  const h = Math.floor(left / 3600_000);
  return h >= 1 ? `剩余 ${h} 小时` : `剩余 ${Math.max(1, Math.floor(left / 60_000))} 分钟`;
}

async function openShareSheet() {
  if (!app.currentId || app.isViewer) return;
  $("sharesheet").classList.add("open");
  const box = $("sharelist");
  box.innerHTML = '<div class="notice">加载中…</div>';
  try {
    const { links } = await app.session.request("share.list", { sessionId: app.currentId });
    renderShareSheet(links ?? []);
  } catch (err) {
    box.innerHTML = "";
    const note = document.createElement("div");
    note.className = "sheetnote";
    note.textContent = /未知方法/.test(err.message)
      ? "电脑端 Remote 版本较旧，尚不支持围观分享。请先更新电脑端 Codex-叉叉。"
      : `加载失败：${err.message}`;
    box.appendChild(note);
  }
}

function renderShareSheet(links, freshUrl) {
  const box = $("sharelist");
  box.innerHTML = "";

  for (const link of links) {
    const row = document.createElement("div");
    row.className = "sharerow";
    const main = document.createElement("div");
    main.className = "smain";
    const name = document.createElement("div");
    name.className = "sname";
    name.textContent = `围观链接（${fmtExpiry(link.expiresAt)}）`;
    main.appendChild(name);
    // 有人围观才显示计数；没人时不留任何文案（也不留空行）
    if (link.viewers > 0) {
      const sub = document.createElement("div");
      sub.className = "ssub";
      sub.textContent = `${link.viewers} 人正在围观`;
      main.appendChild(sub);
    }
    row.appendChild(main);
    if (link.url) {
      const copy = document.createElement("button");
      copy.textContent = "复制";
      copy.onclick = async () => {
        showToast((await copyText(link.url)) ? "围观链接已复制" : "复制失败，请长按链接手动复制");
      };
      row.appendChild(copy);
    }
    // 按链接静音全部互动（喝彩等）：防打扰是底线
    const mute = document.createElement("button");
    mute.textContent = link.muted ? "已静音" : "静音互动";
    mute.onclick = async () => {
      try {
        await app.session.request("share.mute", { deviceId: link.deviceId, muted: !link.muted });
        openShareSheet();
      } catch (err) {
        showBanner(`设置失败：${err.message}`);
      }
    };
    row.appendChild(mute);
    const revoke = document.createElement("button");
    revoke.className = "srevoke";
    revoke.textContent = "撤销";
    revoke.onclick = async () => {
      if (!confirm("撤销这条围观链接？所有正在围观的人会立即断开。")) return;
      try {
        await app.session.request("share.revoke", { deviceId: link.deviceId });
        showToast("已撤销");
        openShareSheet(); // 重拉列表
      } catch (err) {
        showBanner(`撤销失败：${err.message}`);
      }
    };
    row.appendChild(revoke);
    box.appendChild(row);
  }

  // 显式生成：ttl 两档（24 小时 / 永久），生成后结果区提供复制 / 系统分享 / 二维码
  const gen = document.createElement("div");
  gen.className = "sharegen";
  for (const [label, ttl] of [["生成 24 小时链接", "24h"], ["生成永久链接", null]]) {
    const b = document.createElement("button");
    b.textContent = links.length ? `再${label}` : label;
    b.onclick = async () => {
      b.disabled = true;
      try {
        const r = await app.session.request("share.create", { sessionId: app.currentId, ttl });
        const { links: fresh } = await app.session.request("share.list", { sessionId: app.currentId });
        renderShareSheet(fresh ?? [], r.url);
      } catch (err) {
        showBanner(`生成失败：${err.message}`);
        b.disabled = false;
      }
    };
    gen.appendChild(b);
  }
  box.appendChild(gen);

  if (freshUrl) {
    const acts = document.createElement("div");
    acts.className = "sharegen";
    const copy = document.createElement("button");
    copy.textContent = "复制围观链接";
    copy.onclick = async () => {
      showToast((await copyText(freshUrl)) ? "围观链接已复制，去群里贴上吧" : "复制失败");
    };
    acts.appendChild(copy);
    if (navigator.share) {
      const sys = document.createElement("button");
      sys.textContent = "分享…";
      sys.onclick = () => navigator.share({ title: "围观我的 Codex 会话", url: freshUrl }).catch(() => {});
      acts.appendChild(sys);
    }
    box.appendChild(acts);
    // 二维码本地生成（链接含只读令牌，绝不可经第三方服务）；扫不动时复制链接是主路径
    try {
      const qr = qrcode(0, "L");
      qr.addData(freshUrl, "Byte");
      qr.make();
      const n = qr.getModuleCount();
      const scale = Math.max(2, Math.floor(240 / n));
      const canvas = document.createElement("canvas");
      canvas.id = "shareqr";
      canvas.width = canvas.height = n * scale;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (qr.isDark(r, c)) ctx.fillRect(c * scale, r * scale, scale, scale);
        }
      }
      box.appendChild(canvas);
    } catch {
      // 载荷超出二维码容量等罕见情形：复制路径仍可用
    }
    const tip = document.createElement("div");
    tip.className = "sheetnote";
    tip.textContent = "任何拿到链接的人点开即可围观。可随时在此撤销。";
    box.appendChild(tip);
  }
}

// —— 一次性启动 ——
async function main() {
  // 一次性 DOM 绑定
  // 页面左上角返回也走 history.back()，与系统返回键统一：消费掉进会话时压的历史项，
  // 由下面的 popstate 处理器执行 closeSession，避免残留一条“前进”历史。
  $("back").onclick = () => history.back();
  // 关掉浏览器的滚动自动恢复：SPA 自己管滚动，否则按返回时 popstate 会把还显示着的
  // 会话页滚动位置回滚到首页记忆值，造成返回瞬间“闪一下”。
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  // 起手压一条"首页哨兵"历史项，让首页的返回键也能被 popstate 接住（否则首页返回直接退出）。
  history.pushState({ czr: "home" }, "");
  // 手机系统返回键/右滑返回：
  //  · 会话内 → 回首页（会话历史项已被弹出，栈里仍留首页哨兵）；
  //  · 首页 → 拦一次并提示，1.6s 内再按一次才真正退出（防误触）。
  window.addEventListener("popstate", () => {
    // 观众无列表可回：返回键与首页同款"再按一次退出"
    if (app.view === "session" && !app.isViewer) { closeSession().catch(() => {}); return; }
    if (app.backExit) { history.back(); return; } // 第二次：不再压回，放行退出
    history.pushState({ czr: "home" }, ""); // 第一次：压回哨兵，停留在首页
    app.backExit = true;
    showToast("再按一次返回退出");
    clearTimeout(app.backExitTimer);
    app.backExitTimer = setTimeout(() => { app.backExit = false; }, 1600);
  });
  bindPullToLoad(); // 会话顶部下拉加载更早历史
  bindReplaySentinel(); // 回放模式的底部继续加载哨兵
  $("send").onclick = sendMessage;
  $("stop").onclick = stopTurn;
  $("input").addEventListener("input", () => { autoGrow(); updateSendState(); });
  // ➕ 动作菜单：拍照 / 选照片 / 粘贴图片
  $("attach").onclick = (e) => {
    e.stopPropagation();
    $("plusmenu").classList.toggle("open");
  };
  document.addEventListener("click", (e) => {
    if (!$("plusmenu").contains(e.target)) $("plusmenu").classList.remove("open");
    if (!$("topmenu").contains(e.target)) $("topmenu").classList.remove("open");
  });
  $("plusmenu").onclick = async (e) => {
    const act = e.target.closest("button")?.dataset.act;
    if (!act) return;
    $("plusmenu").classList.remove("open");
    const file = $("file");
    if (act === "plan") {
      setPlanMode(!app.planMode);
    } else if (act === "goal") {
      await editGoal();
    } else if (act === "tfile") {
      $("tfile").click();
    } else if (act === "camera") { // capture 属性直接起相机；选照片路径则走相册
      file.setAttribute("capture", "environment");
      file.click();
    } else if (act === "photos") {
      file.removeAttribute("capture");
      file.click();
    } else if (act === "paste") {
      await pasteImage();
    }
  };
  $("file").onchange = async () => {
    await pickFiles([...$("file").files]);
    $("file").value = ""; // 允许再次选择同一张
  };
  $("tfile").onchange = async () => {
    const f = $("tfile").files[0];
    if (f) await attachTextFile(f).catch(() => showBanner("读取文件失败"));
    $("tfile").value = "";
  };
  $("planpill").onclick = () => setPlanMode(false);
  app.turnOpts = loadTurnOpts();
  updateOptButtons();
  $("permbtn").onclick = openPermSheet;
  $("modelbtn").onclick = openModelSheet;
  $("permsheet").onclick = (e) => { if (e.target === $("permsheet")) $("permsheet").classList.remove("open"); };
  $("modelsheet").onclick = (e) => { if (e.target === $("modelsheet")) $("modelsheet").classList.remove("open"); };
  // 桌面（精确指针）Enter 发送、Shift+Enter 换行；手机键盘 Enter 保持换行；中文输入法合成中不触发
  $("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey && !e.isComposing && matchMedia("(pointer: fine)").matches) {
      e.preventDefault();
      sendMessage();
    }
  });
  $("jump").onclick = () => { scrollToBottom(); updateJump(); };
  window.addEventListener("scroll", updateJump, { passive: true });
  // iOS 软键盘不压缩布局视口（不认 interactive-widget），fixed 输入区会被键盘整个盖住：
  // 用 visualViewport 实测可视高度，把输入区顶到键盘上沿
  if (window.visualViewport) {
    const vv = window.visualViewport;
    const adjust = () => {
      const gap = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      const shift = gap ? `translateY(-${gap}px)` : "";
      $("composer").style.transform = shift;
      $("jump").style.transform = shift;
      $("homebar").style.transform = shift; // 首页搜索框也不能被键盘盖住
    };
    vv.addEventListener("resize", adjust);
    vv.addEventListener("scroll", adjust);
  }
  $("search").addEventListener("input", () => {
    app.filter = $("search").value;
    renderList(app.lastSessions);
  });
  $("hmid").onclick = () => { if (!app.isViewer) openSheet(); }; // 观众不进"切换电脑"（切进去出不来）
  $("sharebtn").onclick = openShareSheet;
  $("sharesheet").onclick = (e) => { if (e.target === $("sharesheet")) $("sharesheet").classList.remove("open"); };
  // 观众喝彩：枚举表情，前端 300ms 防抖（服务端另有令牌桶）；渲染靠广播回流，双端一致
  const EMOJI = ["👏", "🔥", "❤️", "😂", "🤯"];
  for (const emoji of EMOJI) {
    const b = document.createElement("button");
    b.textContent = emoji;
    b.onclick = () => {
      const now = Date.now();
      if (now - (app.lastReactAt ?? 0) < 300) return;
      app.lastReactAt = now;
      app.session?.request("share.react", { emoji }).catch(() => {});
    };
    $("vreact").appendChild(b);
  }
  // 转发围观：复制同一条链接（链接自我裂变，每一跳都不需要回到创作者）
  $("vshare").onclick = async () => {
    let raw = null;
    try { raw = JSON.parse(sessionStorage.getItem("czr-viewer") || "null")?.raw; } catch {}
    if (!raw) { showToast("链接不可用，请回到聊天里转发原链接"); return; }
    const url = `${location.origin}${location.pathname}#d=${raw}`;
    if (navigator.share) {
      navigator.share({ title: "围观一场 Codex 会话", url }).catch(() => {});
    } else {
      showToast((await copyText(url)) ? "围观链接已复制" : "复制失败");
    }
  };
  // 一键复制 prompt：观众学的核心就是"他是怎么跟 agent 说话的"（纯前端）
  $("log").addEventListener("click", async (e) => {
    if (!app.isViewer) return;
    const bubble = e.target.closest(".msg.user .bubble");
    if (!bubble) return;
    showToast((await copyText(bubble.textContent)) ? "已复制这条 prompt" : "复制失败");
  });
  $("newchat").onclick = newSession;
  // ⋯ 菜单：组织方式切换 + 外观 + 管理入口
  applyTheme(getTheme()); // 补齐 meta theme-color（变量层已在头部脚本提前生效）
  $("menubtn").onclick = (e) => {
    e.stopPropagation();
    updateOrganizeChecks();
    updateThemeChecks();
    updateFontChecks();
    $("topmenu").classList.toggle("open");
  };
  $("topmenu").onclick = (e) => {
    const act = e.target.closest("button")?.dataset.act;
    if (!act) return;
    $("topmenu").classList.remove("open");
    if (act === "proj" || act === "time") {
      app.organize = act;
      localStorage.setItem("czr-organize", act);
      renderList(app.lastSessions);
    } else if (act === "th-auto" || act === "th-light" || act === "th-dark") {
      applyTheme(act.slice(3));
    } else if (act === "fs-normal" || act === "fs-large") {
      applyFontSize(act.slice(3));
    } else if (act === "pc") {
      openSheet();
    } else if (act === "diag") {
      openDiag();
    }
  };
  $("sheet").onclick = (e) => { if (e.target === $("sheet")) $("sheet").classList.remove("open"); };
  $("dirsheet").onclick = (e) => { if (e.target === $("dirsheet")) $("dirsheet").classList.remove("open"); };
  $("diagsheet").onclick = (e) => { if (e.target === $("diagsheet")) $("diagsheet").classList.remove("open"); };
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") app.session?.ensureAlive();
    else app.session?.stopPing(); // 切后台立即停心跳，不留后台流量
  });
  // 蜂窝↔WiFi 切换、飞行模式恢复：不等退避计时，马上验活/重连。
  // 后台收到 online 不动作（保持零后台活动），回前台由 visibilitychange 补上
  window.addEventListener("online", () => {
    if (document.visibilityState === "visible") app.session?.ensureAlive();
  });
  // 注册 Service Worker（PWA 离线壳）
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }

  // 通知深链 #s=<sessionId>：连上后直达该会话（在 loadDaemonInfo 之前解析，二者不共存）
  const hashParams = new URLSearchParams(location.hash.slice(1));
  if (hashParams.get("s")) {
    app.deepLink = hashParams.get("s");
    history.replaceState(null, "", location.pathname);
  }

  const info = loadDaemonInfo();
  if (!info) {
    renderOnboarding();
    $("status").textContent = "未配对";
    return;
  }
  startSession(info);
}
// 本地预览调试钩子：控制台注入假数据即可渲染各视图，不影响正常逻辑
window.__czr = { app, net, renderList, renderInto, renderApprovals, showApproval, setRunning, setTitle,
                 updateStatusPill, openDiag, onLive, appendStream, renderOnboarding,
                 renderAttachments, updateSendState, enqueue, addEcho, autoGrow,
                 openPermSheet, openModelSheet, updateOptButtons, renderModelSheet,
                 setPlanMode, editGoal, attachTextFile };
main();
</script>
</body>
</html>
