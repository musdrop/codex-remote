    else if (/iPad/i.test(ua)) os = "iPad";
    else if (/Android/i.test(ua)) os = androidVendor(ua);
    else if (/Macintosh|Mac OS X/i.test(ua)) os = "Mac";
    else if (/Windows/i.test(ua)) os = "Windows";
    else if (/Linux/i.test(ua)) os = "Linux";
    else os = navigator.userAgentData?.platform || "设备";
    let app = "";
    const wx = ua.match(/MicroMessenger\/([\d.]+)/i);
    if (wx) app = "微信" + (wx[1] ? " " + wx[1].split(".").slice(0, 3).join(".") : "");
    else if (/\bQQ\/|QQBrowser/i.test(ua)) app = "QQ";
    else if (/Edg[A-Z]?\//i.test(ua)) app = "Edge";
    else if (/CriOS|Chrome\//i.test(ua)) app = "Chrome";
    else if (/FxiOS|Firefox\//i.test(ua)) app = "Firefox";
    else if (/Safari\//i.test(ua)) app = "Safari";
    return app ? `${os} · ${app}` : os;
  } catch { return ""; }
}

class Session {
  constructor(daemonInfo) {
    this.info = daemonInfo;
    this.pendingRequests = new Map();
    this.nextId = 1;
    this.firstFrame = true;
    this.closedByUser = false;
    this.dead = false;          // 终态：令牌被撤销/失效，永不再重连
    this.reconnectAttempt = 0;
    this.reconnectTimer = null;
    this.connEpoch = 0;         // 连接代次：过期尝试的回调/失败一律作废，防新旧 socket 互踩
    this.hbSupported = false;   // relay 是否应答 hb（收到首个 pong 后置真）
    this.lastPong = 0;
    this.lastPingAt = 0;
    this.pingTimer = null;
    this.onNotify = () => {};
    this.onStatus = () => {};   // (patch) 链路状态增量：{link?, daemon?, lastSeen?}
    this.onReady = () => {};    // 每次（重）鉴权成功后回调，供上层重拉/重watch
    this.onAuthFail = () => {};  // 令牌被撤销/失效（403）：终态回调，上层停重连并引导重配对
    this.awaitingAuth = false;  // 本次连接的鉴权尚未确认前，不信中继乐观的 online（防"标绿却连不上"）
    this.needsReauth = false;   // 后台鉴权超时时置位，回前台由 ensureAlive 强制重连重鉴权
  }

  async start() {
    this.closedByUser = false;
    await this.#openAndAuth();
  }

  async #openAndAuth() {
    // 领一个新代次并顶掉旧连接：旧 socket 的回调按代次作废，
    // 否则鉴权超时后旧连接迟到的 onclose 会误杀新连接的 pending、叠加第二个重连
    const epoch = ++this.connEpoch;
    const stale = this.ws;
    this.ws = null;
    if (stale) try { stale.close(); } catch {}
    try {
      const { key, ephPubRaw } = await deriveKey(this.info);
      if (this.connEpoch !== epoch) return; // 已被更新的尝试顶掉
      this.key = key;
      this.ephPubRaw = ephPubRaw;
      this.firstFrame = true;
      const ws = new WebSocket(`${this.info.relay.replace(/\/$/, "")}/v1/client/${this.info.id}`);
      this.ws = ws;
      await new Promise((ok, bad) => {
        ws.onopen = ok;
        ws.onerror = () => bad(new Error("无法连接中继"));
        ws.onclose = () => bad(new Error("无法连接中继"));
      });
      if (this.connEpoch !== epoch) { try { ws.close(); } catch {} return; }
      ws.onmessage = (e) => { if (this.connEpoch === epoch) this.onFrame(JSON.parse(e.data)); };
      ws.onclose = () => { if (this.connEpoch === epoch) this.#onClose(); };
      // 首次用配对码，之后一律用设备令牌；带上本端协议版本
      const authParams = this.info.fromPair
        ? { pairToken: this.info.tok, protocol: APP_PROTOCOL, name: deviceLabel(), clientId: clientId() }
        : { deviceToken: this.info.deviceToken, protocol: APP_PROTOCOL, name: deviceLabel(), clientId: clientId() };
      let auth;
      this.awaitingAuth = true; // 鉴权确认前不让中继乐观的 online 把界面标绿
      try {
        auth = await this.request("auth", authParams);
      } catch (err) {
        if (this.connEpoch !== epoch) return;
        // 403=配对码失效 / 设备令牌被电脑端撤销：重试也永远失败，转终态而非无限重连
        if (err.code === 403) {
          this.dead = true;
          this.stopPing();
          try { this.ws?.close(); } catch {}
          this.onAuthFail(err);
          return;
        }
        // 手机↔中继是通的，但电脑没在超时内应答鉴权——最常见是电脑断网/睡眠，中继还没
        // 察觉它掉线仍报 online。别沿用这份乐观状态标绿：明确标"电脑离线"，退避重试等它恢复。
        // awaitingAuth 保持 true：等待期间若中继又发来乐观 online，仍按"未知"处理不标绿。
        this.onStatus({ link: "ok", daemon: false, engine: null });
        this.#retryAuth();
        return;
      }
      if (this.connEpoch !== epoch) return;
      if (auth.deviceToken && !this.info.viewer) {
        this.info = { ...this.info, fromPair: false, deviceToken: auth.deviceToken, name: auth.daemonName };
        saveDaemon(this.info); // 配对成功即入库并设为活跃（观众凭据永不入库）
      }
      // 电脑端协议更新：PWA 可能缓存了旧代码。装到主屏幕后没有"下拉刷新"，
      // 横幅本身就是刷新按钮
      if (auth.protocol > APP_PROTOCOL) {
        setTimeout(() => showBanner("电脑端 Remote 已更新，点这里刷新页面", () => location.reload()), 0);
      }
      this.reconnectAttempt = 0;
      this.startPing();
      // 鉴权确认电脑可用——此后才允许标绿；清掉后台重鉴权标记
      this.awaitingAuth = false;
      this.needsReauth = false;
      this.onStatus({ link: "ok", daemon: true });
      this.onReady(auth);
    } catch (err) {
      if (this.connEpoch !== epoch) return; // 过期尝试的失败静默丢弃，不再触发重连
      throw err;
    }
  }

  #onClose() {
    if (this.reconnectTimer) return; // 已有重连排队，避免关闭事件与失败回调重复调度
    this.stopPing();
    for (const [, p] of this.pendingRequests) p.reject(new Error("连接断开"));
    this.pendingRequests.clear();
    if (this.closedByUser || this.dead) return; // 令牌终态：主动 close 触发的 onclose 不再排重连
    // 页面不在前台就不排重连：后台无限退避重试违背"不可见即零活动"，
    // 回前台时 ensureAlive 会立即重连（iOS 冻结页面，安卓/桌面后台标签页则真会跑）
    if (document.visibilityState !== "visible") {
      this.onStatus({ link: "down" });
      return;
    }
    // 首跳 300ms：偶发抖断几乎无感；之后指数退避
    const delay = this.reconnectAttempt === 0 ? 300 : Math.min(1000 * 2 ** this.reconnectAttempt, 15000);
    this.reconnectAttempt += 1;
    this.onStatus({ link: "down" });
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.#openAndAuth().catch(() => this.#onClose());
    }, delay);
  }

  // 鉴权超时/失败（非 403，且手机↔中继仍正常）：电脑暂不可达，退避重连重鉴权，
  // 等电脑恢复后自动接上。与 #onClose 分工：onClose 处理"中继断开"，这里处理"中继在、
  // 电脑不应答"——所以保留 link:ok，不误报成手机网络问题。
  #retryAuth() {
    if (this.closedByUser || this.dead) return;
    if (this.reconnectTimer) return; // 已有重连排队，不叠加
    if (document.visibilityState !== "visible") { this.needsReauth = true; return; } // 后台不轮询
    const delay = this.reconnectAttempt === 0 ? 800 : Math.min(1000 * 2 ** this.reconnectAttempt, 15000);
    this.reconnectAttempt += 1;
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.#openAndAuth().catch(() => this.#onClose());
    }, delay);
  }

  // —— 前台心跳：只在页面可见时跑，切后台/锁屏即停（零后台流量）——
  startPing() {
    this.stopPing();
    if (this.closedByUser || this.dead || document.visibilityState !== "visible") return;
    if (this.ws?.readyState !== WebSocket.OPEN) return;
    this.#sendHb(); // 立即发一拍：既是能力探测也刷新 lastPong 基线
    this.pingTimer = setInterval(() => {
      if (this.ws?.readyState !== WebSocket.OPEN) return;
      if (this.hbSupported && this.lastPong < this.lastPingAt) {
        this.#rebuild(); // 上一拍没回：readyState 说 OPEN 也不信
        return;
      }
      this.#sendHb();
    }, PING_MS);
  }

  stopPing() {
    if (this.pingTimer) clearInterval(this.pingTimer);
    this.pingTimer = null;
  }

  #sendHb() {
    this.lastPingAt = Date.now();
    try { this.ws.send(HB_FRAME); } catch { this.#rebuild(); }
  }

  // 僵尸连接强制重建：摘掉旧 socket 的回调避免二次触发，立刻重开
  #rebuild() {
    const ws = this.ws;
    if (ws) { ws.onclose = null; ws.onmessage = null; try { ws.close(); } catch {} }
    this.ws = null;
    this.stopPing();
    for (const [, p] of this.pendingRequests) p.reject(new Error("连接断开"));
    this.pendingRequests.clear();
    if (this.closedByUser || this.dead) return;
    this.onStatus({ link: "connecting" });
    this.reconnectAttempt = 0;
    this.#openAndAuth().catch(() => this.#onClose());
  }

  // 回到前台/网络恢复时调用：断了立即重连；看似 OPEN 也要验活（iOS 僵尸 socket）
  ensureAlive() {
    if (this.closedByUser || this.dead) return;
    // 后台鉴权超时留下的欠账：socket 看着还 OPEN 但从未鉴权成功，单纯 ping 没用，
    // 必须重建以重新握手+重鉴权（否则回前台会卡在"电脑离线"）。
    if (this.needsReauth) {
      this.needsReauth = false;
      this.#rebuild();
      return;
    }
    if (this.reconnectTimer) {
      clearTimeout(this.reconnectTimer);
      this.reconnectTimer = null;
    }
    if (this.ws?.readyState === WebSocket.OPEN) {
      this.startPing(); // 重启前台心跳（切后台时停了）
      if (this.hbSupported) {
        const sentAt = Date.now();
        const ws = this.ws;
        try { ws.send(HB_FRAME); } catch { this.#rebuild(); return; }
        setTimeout(() => {
          // 只裁决当时探测的那条连接；期间已重建/切后台则不动（避免误杀新连接、后台重连）
          if (this.closedByUser || this.ws !== ws) return;
          if (document.visibilityState !== "visible") return;
          if (ws.readyState === WebSocket.OPEN && this.lastPong < sentAt) this.#rebuild();
        }, HB_VERIFY_MS);
      }
      return;
    }
    this.reconnectAttempt = 0;
    this.#openAndAuth().catch(() => this.#onClose());
  }

  async onFrame(frame) {
    if (frame.t === "hb") {
      this.hbSupported = true;
      this.lastPong = Date.now();
      return;
    }
    if (frame.t === "status") {
      // 电脑是否可用以"鉴权成功"为准，而非中继单方面的 online：电脑断网后中继要过一会
      // 才察觉、期间仍报 online。鉴权确认前，online 只当"未知"，避免标绿却其实连不上。
      const daemon = (this.awaitingAuth && frame.online) ? null : frame.online;
      this.onStatus({ link: "ok", daemon, lastSeen: frame.lastSeen ?? null });
      return;
    }
    if (frame.t !== "msg") return;
    const env = frame.data;
    const iv = b64.from(env.n);
    const data = b64.from(env.c);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv, additionalData: AAD_D2C }, this.key, data);
    const msg = JSON.parse(new TextDecoder().decode(plain));
    if (msg.id !== undefined && this.pendingRequests.has(msg.id)) {
      const { resolve, reject } = this.pendingRequests.get(msg.id);
      this.pendingRequests.delete(msg.id);
      if (msg.error) {
        const e = new Error(msg.error.message);
        e.code = msg.error.code; // 保留状态码：403=令牌失效/被撤销，供上层判终态
        reject(e);
      } else resolve(msg.result);
    } else if (msg.method) {
      this.onNotify(msg);
    }
  }

  async send(payload) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const cipher = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv, additionalData: AAD_C2D }, this.key, enc.encode(JSON.stringify(payload)));
    const envelope = { n: b64.to(iv), c: b64.to(cipher) };
    if (this.firstFrame) {
      envelope.v = 1;
      envelope.k = b64.to(this.ephPubRaw);
      this.firstFrame = false;
    }
    this.ws.send(JSON.stringify({ t: "msg", data: envelope }));
  }

  request(method, params = {}, timeoutMs = 15000) {
    const id = this.nextId++;
    return new Promise((resolve, reject) => {
      this.pendingRequests.set(id, { resolve, reject });
      this.send({ id, method, params }).catch(reject);
      setTimeout(() => {
        if (this.pendingRequests.has(id)) {
          this.pendingRequests.delete(id);
          reject(new Error(`请求超时: ${method}`));
        }
      }, timeoutMs);
    });
  }
}

// —— rollout 条目渲染 ——
// 关键：codex 把每条逻辑消息写两遍——语义事件 `event_msg`（agent_message/
// user_message）+ OpenAI API 格式 `response_item`（message）。二者内容相同，
// 若都渲染就会重复（"两条收到"）。只认 event_msg 语义流，response_item 一律跳过。
function extractText(value, depth = 0) {
  if (depth > 4 || value == null) return "";
  if (typeof value === "string") return value;
  if (Array.isArray(value)) return value.map((v) => extractText(v, depth + 1)).filter(Boolean).join("\n");
  if (typeof value === "object") {
    for (const k of ["text", "message", "content", "command", "aggregated_output"]) {
      if (k in value) {
        const got = extractText(value[k], depth + 1);
        if (got) return got;
      }
    }
  }
  return "";
}

// —— rollout item -> 渲染指令 ——
// 对话正文认 event_msg（user_message/agent_message）；工具调用认 response_item
// （function_call + function_call_output 以 call_id 配对，这是现行 codex 记录命令
// 的唯一位置——event_msg 早已不含 exec_command_*，但保留旧格式兼容）。
// 返回值：null | {cls:"user"|"assistant", text}
//        | {cls:"tool", icon, label, detail, callId}   工具调用折叠行
//        | {cls:"toolout", callId, text, code}          工具输出（并入对应折叠行）
//        | {cls:"diff", files:[{path,kind,diff}], ok}   文件改动
const EXEC_NAME_RE = /exec|shell|bash|command/i;

function parseJson(str) {
  try { return JSON.parse(str ?? "{}") ?? {}; } catch { return {}; }
}

// GUI 版 exec 输出带 harness 前言（Chunk ID/Wall time/…/Output:），剥掉只留正文与退出码
function cleanExecOutput(raw) {
  const m = raw.match(/Process exited with code (\d+)/);
  const idx = raw.indexOf("Output:\n");
  if (!m && idx < 0) return { code: null, body: raw };
  return { code: m ? Number(m[1]) : null, body: idx >= 0 ? raw.slice(idx + 8).replace(/^---\n/, "") : raw };
}

function itemToBubble(item) {
  const t = item?.type;
  const p = item?.payload ?? {};
  // daemon 对超过 48KB 的单条做了截断保护：渲染占位而不是让消息凭空消失
  if (p.truncated) return { cls: "trunc" };
  if (t === "event_msg") {
    const pt = p.type;
    if (pt === "user_message" || pt === "agent_message") {
      const text = String(p.message ?? "").trim();
      return text ? { cls: pt === "user_message" ? "user" : "assistant", text } : null;
    }
    if (pt === "patch_apply_end") {
      const files = Object.entries(p.changes ?? {}).map(([path, c]) => ({
        path, kind: c?.type ?? "update", diff: String(c?.unified_diff ?? ""),
      }));
      return files.length ? { cls: "diff", files, ok: p.success !== false } : null;
    }
    if (pt === "web_search_end") {
      const q = String(p.query ?? "").trim();
      return q ? { cls: "tool", icon: "⌕", label: q, detail: q, callId: null } : null; // 图标已表意，不再加「搜索：」前缀
    }
    // 旧格式兼容：现行版本命令在 response_item 里，见到过 function_call 就跳过这两类避免重复
    if (pt === "exec_command_begin" && !app.sawFunctionCalls) {
      const cmd = Array.isArray(p.command) ? p.command.join(" ") : (p.command ?? "");
      return cmd ? { cls: "tool", icon: "$", label: cmd, detail: cmd, callId: p.call_id ?? null } : null;
    }
    if (pt === "exec_command_end" && !app.sawFunctionCalls) {
      const out = String(p.aggregated_output ?? p.stdout ?? "").trim();
      const code = p.exit_code ?? (p.success === false ? 1 : 0);
      return out || code ? { cls: "toolout", callId: p.call_id ?? null, text: out, code } : null;
    }
    return null; // task_started/token_count/mcp_tool_call_end（与 response_item 重复）等跳过
  }
  if (t === "response_item") {
    const pt = p.type;
    if (pt === "image_generation_call") {
      // 生成图：daemon 已把 base64 抽出缓存，这里只剩引用
      return p.imageRef ? { cls: "images", refs: [p.imageRef], user: false } : null;
    }
    if (pt === "message" && Array.isArray(p.content)) {
      // 文本部分与 event_msg 重复（跳过），但用户贴的图只存在于这里
      const refs = p.content.map((c) => c?.imageRef).filter(Boolean);
      if (refs.length) return { cls: "images", refs, user: p.role === "user" };
      return null;
    }
    if (pt === "function_call") {
      app.sawFunctionCalls = true;
      const args = parseJson(p.arguments);
      if (EXEC_NAME_RE.test(p.name ?? "")) {
        const cmd = args.cmd ?? args.command;
        const text = (Array.isArray(cmd) ? cmd.join(" ") : cmd) || "";
        return { cls: "tool", icon: "$", label: text || p.name,
                 detail: text || JSON.stringify(args, null, 2), callId: p.call_id ?? null };
      }
      return { cls: "tool", icon: "⚙", label: p.name || "工具调用",
               detail: JSON.stringify(args, null, 2), callId: p.call_id ?? null };
    }
    if (pt === "function_call_output" || pt === "custom_tool_call_output") {
      app.sawFunctionCalls = true;
      const raw = String(typeof p.output === "string" ? p.output : extractText(p.output)).trim();
      if (!raw) return null;
      const { code, body } = cleanExecOutput(raw);
      return { cls: "toolout", callId: p.call_id ?? null, text: body.trim() || raw, code };
    }
    if (pt === "custom_tool_call") {
      return { cls: "tool", icon: "⚙", label: p.name || "工具调用",
               detail: String(p.input ?? ""), callId: p.call_id ?? null };
    }
    return null; // message/reasoning（与 event_msg 重复或不外显）等跳过
  }
  if (["turn_context", "session_meta", "compacted"].includes(t)) return null;
  // 更老格式（无 event_msg）：回退通用提取，保持旧会话兼容
  const text = extractText(p ?? item).trim();
  if (!text) return null;
  const kind = `${t ?? ""}:${p?.type ?? ""}`;
  if (/user/i.test(kind)) return { cls: "user", text };
  if (/command|exec|shell/i.test(kind)) return { cls: "tool", icon: "$", label: text, detail: text, callId: null };
  if (/agent|assistant|message/i.test(kind)) return { cls: "assistant", text };
  return null; // 未知且非消息：不渲染，避免噪声
}

// —— 轻量 markdown 渲染（纯 DOM 构建，无 innerHTML，天然防注入）——
// 支持：段落、标题、无序/有序列表、围栏代码块、行内代码、粗体、链接、引用、分隔线。
function mdInline(text) {
  const frag = document.createDocumentFragment();
  const re = /(`[^`\n]+`)|(\*\*[^*\n]+\*\*)|\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g;
  let last = 0, m;
  while ((m = re.exec(text))) {
    if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    if (m[1]) {
      const c = document.createElement("code");
      c.textContent = m[1].slice(1, -1);
      frag.appendChild(c);
    } else if (m[2]) {
      const b = document.createElement("strong");
      b.textContent = m[2].slice(2, -2);
      frag.appendChild(b);
    } else {
      const a = document.createElement("a");
      a.href = m[4]; a.textContent = m[3];
      a.target = "_blank"; a.rel = "noopener noreferrer";
      frag.appendChild(a);
    }
    last = re.lastIndex;
  }
  if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

function mdRender(text) {
  const root = document.createElement("div");
  root.className = "md";
  const lines = text.split("\n");
  const para = [];
  const flushPara = () => {
    if (!para.length) return;
    const p = document.createElement("p");
    para.forEach((l, idx) => {
      if (idx) p.appendChild(document.createElement("br"));
      p.appendChild(mdInline(l));
    });
    root.appendChild(p);
    para.length = 0;
  };
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^```/.test(line)) {
      flushPara();
      const buf = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++; // 跳过闭合围栏
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.textContent = buf.join("\n");
      pre.appendChild(code);
      root.appendChild(pre);
      continue;
    }
    const h = line.match(/^(#{1,4})\s+(.*)/);
    if (h) {
      flushPara();
      // # -> h3 起步：对话流里不需要巨型标题
      const el = document.createElement(`h${Math.min(h[1].length + 2, 6)}`);
      el.appendChild(mdInline(h[2]));
      root.appendChild(el);
      i++;
      continue;
    }
    // 表格：| a | b | 行 + 紧随的 |---|---| 分隔行
    const sep = lines[i + 1] ?? "";
    if (/^\s*\|/.test(line) && /^\s*\|?[\s:|-]+\|?\s*$/.test(sep) && sep.includes("-")) {
      flushPara();
      const rows = [];
      while (i < lines.length && /^\s*\|/.test(lines[i])) rows.push(lines[i++]);
      const cells = (row) => row.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map((c) => c.trim());
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      for (const c of cells(rows[0])) {
        const th = document.createElement("th");
        th.appendChild(mdInline(c));
        headRow.appendChild(th);
      }
      thead.appendChild(headRow);
      const tbody = document.createElement("tbody");
      for (const row of rows.slice(2)) {
        const tr = document.createElement("tr");
        for (const c of cells(row)) {
          const td = document.createElement("td");
          td.appendChild(mdInline(c));
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.append(thead, tbody);
      root.appendChild(table);
      continue;
    }
    const li = line.match(/^\s*([-*]|\d+[.、])\s+(.*)/);
    if (li) {
      flushPara();
      const listEl = document.createElement(/^\d/.test(li[1]) ? "ol" : "ul");
      while (i < lines.length) {
        const m2 = lines[i].match(/^\s*([-*]|\d+[.、])\s+(.*)/);
        if (!m2) break;
        const item = document.createElement("li");
        item.appendChild(mdInline(m2[2]));
        listEl.appendChild(item);
        i++;
      }
      root.appendChild(listEl);
      continue;
    }
    if (/^>\s?/.test(line)) {
      flushPara();
      const bq = document.createElement("blockquote");
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) buf.push(lines[i++].replace(/^>\s?/, ""));
      buf.forEach((l, idx) => {
        if (idx) bq.appendChild(document.createElement("br"));
        bq.appendChild(mdInline(l));
      });
      root.appendChild(bq);
      continue;
    }
    if (/^(---+|\*\*\*+)\s*$/.test(line)) { flushPara(); root.appendChild(document.createElement("hr")); i++; continue; }
    if (/^\s*$/.test(line)) { flushPara(); i++; continue; }
    para.push(line);
    i++;
  }
  flushPara();
  return root;
}

// —— 气泡构建 ——
const CLIP = 6000;
const clip = (text) => (text.length > CLIP ? `${text.slice(0, CLIP)}…` : text);

// 工具调用折叠行：头部一行摘要（图标 + 命令/工具名 + 状态角标），
// 点开看完整调用与输出。输出到达时经 attachToolOutput 按 call_id 并入。
function toolRow({ icon, label, detail, callId }) {
  const wrap = document.createElement("div");
  wrap.className = "tool";
  const head = document.createElement("div");
  head.className = "tool-head";
  const chev = document.createElement("span");
  chev.className = "tchev";
  chev.textContent = "▶";
  const cmd = document.createElement("span");
  cmd.className = "tcmd";
  cmd.textContent = `${icon} ${(label || "").split("\n")[0]}`;
  const stat = document.createElement("span");
  stat.className = "tstat";
  head.append(chev, cmd, stat);
  const body = document.createElement("div");
  body.className = "tool-body";
  const tin = document.createElement("div");
  tin.textContent = clip(detail || label || "");
  const tout = document.createElement("div");
  tout.className = "tout";
  body.append(tin, tout);
  head.onclick = () => wrap.classList.toggle("open");
  wrap.append(head, body);
  if (callId) app.toolNodes.set(callId, { stat, tout });
  return wrap;
}

// 工具输出并入对应折叠行；找不到（如快照被截断）则退化为独立行
function attachToolOutput({ callId, text, code }) {
  const ref = callId ? app.toolNodes.get(callId) : null;
  if (!ref) {
    return text ? toolRow({ icon: "↳", label: `输出${code ? `（退出码 ${code}）` : ""}`, detail: text, callId: null }) : null;
  }
  if (text) {
    ref.tout.textContent = clip(text);
    ref.tout.style.display = "block";
  }
  if (code !== null && code !== undefined) {
    ref.stat.textContent = code === 0 ? "✓" : `✗ ${code}`;
    ref.stat.classList.add(code === 0 ? "ok" : "err");
  }
  return null; // 已并入，无新节点
}

// 每个文件：路径标题 + 着色 diff 行（会话流的改动卡与审批卡共用）
function appendDiffFiles(container, files) {
  for (const f of files) {
    const h = document.createElement("div");
    h.className = "dfile";
    h.textContent = `${f.kind === "add" ? "＋" : f.kind === "delete" ? "－" : "±"} ${f.path}`;
    container.appendChild(h);
    for (const line of clip(f.diff || "").split("\n")) {
      if (!line && f.diff === "") continue; // delete 类无 diff，不渲染空行
      const div = document.createElement("div");
      if (/^\+/.test(line)) div.className = "dl-add";
      else if (/^-/.test(line)) div.className = "dl-del";
      else if (/^@@/.test(line)) div.className = "dl-hunk";
      div.textContent = line || " ";
      container.appendChild(div);
    }
  }
}

// 文件改动卡：标题 + 每个文件的着色 diff
function diffNode({ files, ok }) {
  const wrap = toolRow({
    icon: "✎",
    label: files.length === 1 ? `修改 ${files[0].path.split(/[\\/]/).pop()}` : `修改 ${files.length} 个文件`,
    detail: "", callId: null,
  });
  const stat = wrap.querySelector(".tstat");
  stat.textContent = ok ? "✓" : "✗";
  stat.classList.add(ok ? "ok" : "err");
  const body = wrap.querySelector(".tool-body");
  body.innerHTML = "";
  appendDiffFiles(body, files);
  return wrap;
}

// —— 图片：按 imageRef 分块拉取（image.fetch），拼回 data URL ——
async function loadImage(ref, box) {
  box.textContent = "加载图片…";
  box.onclick = null;
  try {
    let data = "";
    let offset = 0;
    let mime = ref.mime || "image/png";
    for (;;) {
      const r = await app.session.request("image.fetch", { id: ref.id, offset }, 20000);
      data += r.data;
      offset += r.data.length;
      mime = r.mime || mime;
      if (r.eof) break;
      if (offset > 16_000_000) throw new Error("图片过大");
    }
    const img = document.createElement("img");
    img.src = `data:${mime};base64,${data}`;
    box.textContent = "";
    box.appendChild(img);
  } catch (err) {
    box.textContent = `图片加载失败：${err.message}（点按重试）`;
    box.onclick = () => loadImage(ref, box);
  }
}

function imagesNode({ refs, user }) {
  const fresh = refs.filter((r) => !(r.id && app.seenImages.has(r.id)));
  if (!fresh.length) return null; // 生成图的多帧进度会重复出现同一张，只渲染一次
  const msg = document.createElement("div");
  msg.className = `msg${user ? " user" : ""}`;
  const col = document.createElement("div");
  col.style.cssText = user ? "max-width:85%" : "width:100%";
  for (const ref of fresh) {
    if (ref.id) app.seenImages.add(ref.id);
    const box = document.createElement("div");
    box.className = "imgbox";
    if (ref.tooLarge || !ref.id) {
      box.textContent = "图片过大，请在电脑端查看";
    } else {
      loadImage(ref, box);
    }
    col.appendChild(box);
  }
  msg.appendChild(col);
  return msg;
}

function bubbleNode({ cls, text }) {
  const msg = document.createElement("div");
  msg.className = `msg ${cls}`;
  if (cls === "user") {
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = clip(text);
    msg.appendChild(b);
  } else {
    msg.appendChild(mdRender(clip(text)));
    // 超长回复不再一刀切：点开看全部
    if (text.length > CLIP) {
      const more = document.createElement("button");
      more.className = "morelink";
      more.textContent = `展开全部（约 ${Math.round(text.length / 1000)}k 字）`;
      more.onclick = () => {
        msg.innerHTML = "";
        msg.appendChild(mdRender(text));
      };
      msg.appendChild(more);
    }
  }
  return msg;
}

// —— 链路状态（三层：手机↔中继 / 中继↔电脑 / Codex 主程序）——
const net = {
  link: "connecting",  // "connecting" | "ok" | "down"
  daemon: null,        // null=未知 | true | false（relay status 帧）
  engine: null,        // null=未知 | "ok" | "down"（auth 结果 + daemon.status 通知）
  lastSeen: null,      // 电脑离线时，最近一次在线的毫秒时间戳（relay 提供，可缺省）
};

// —— 应用控制器 ——
const app = {
  session: null,
  view: "list",        // "list" | "session"
  currentId: null,     // 打开的会话 id
  currentTitle: "",
  running: false,      // 该会话是否有进行中的轮次
  driver: null,        // 运行驱动方："daemon"（手机可停止）| "desktop"（只可看）| null
  titleTimer: null,    // refreshTitle 防抖
  sessionNames: new Map(), // id -> 展示名（审批卡片用）
  lastSessions: [],        // 最近一次 sessions.list 结果（目录选择器数据源）
  histLimit: 200,          // 当前会话回填的 rollout 条数（下拉一次 +200，与 daemon SNAPSHOT_MAX_ITEMS 对齐）
  histTotal: 0,            // 该会话 rollout 总条数（daemon 随快照下发；> histLimit 即"上面还有更早"）
  loadingEarlier: false,   // 正在加载更早历史（snapshot 回来时改为锚定滚动，不落底）
  earlierAnchor: null,     // 加载前锚点 {count, top}，重渲染后据此还原滚动位置
  approvals: new Map(),    // approvalKey -> 请求参数（全局待审批注册表）
  echoes: [],              // 乐观渲染的用户气泡 {text, imgs, el}，等 tail 确认后移除
  attachments: [],         // 待发送的图片 {b64, mime}（最多 4 张）
  queue: [],               // 运行中排队的消息 {text, atts, el}，本轮结束后逐条发出
  turnOpts: null,          // 按轮 override：{perm, model, modelName, effort}（localStorage 持久化）
  models: null,            // models.list 结果缓存（懒加载）
  planMode: false,         // 计划模式（会话级，切换会话即复位）
  ctxPct: null,            // 本会话上下文用量百分比（token_count 事件回填，暂不常显）
  toolNodes: new Map(),    // call_id -> {stat, tout}，输出到达时并入调用行
  proc: null,              // 进行中的过程组 {wrap, body, label, count, startTs}，task_complete 时收拢
  seenImages: new Set(),   // 已渲染的 imageRef id（生成图多帧进度去重）
  drafts: new Map(),       // sessionId -> 未发送的输入草稿（会话间不串）
  filter: "",              // 会话列表搜索词
  organize: localStorage.getItem("czr-organize") || "proj", // 首页组织方式：proj 按项目 | time 时间线
  expanded: loadExpanded(),  // 手动展开的项目 cwd 集合（持久化）；不在集合里=折叠，故默认全折叠
  sawFunctionCalls: false, // 会话流里见过 response_item function_call（旧格式去重用）
  stream: null,            // 流式草稿气泡 {el, raw, text}
  runStart: 0,             // 本轮开始时间（状态条耗时显示）
  runTimer: null,
  deepLink: null,          // 通知深链带来的 sessionId（#s=...）
  refreshTimer: null,
  isViewer: false,         // 观众态（围观链接进入）：只读，无列表/操作/审批
  viewerEnded: false,      // 围观终态（被踢/过期）：停止重连，显示"围观已结束"
  replayMode: false,       // 回放模式（已结束会话从头读）：翻页方向由"加载更早"倒转为"继续加载"
  replayDone: false,       // 回放已读到末条
  replayLoading: false,
  replayLastAt: 0,         // 客户端自限 ≥2s，与 daemon 的 viewer 频控对齐
};

function showBanner(text, onTap) {
  const b = $("banner");
  b.style.display = text ? "block" : "none";
  b.textContent = text || "";
  b.classList.toggle("action", Boolean(onTap));
  b.onclick = onTap || null;
}

// 轻量瞬时提示（如"再按一次返回退出"），自动淡出，不占布局
let toastTimer = null;
function showToast(text, ms = 1600) {
  const t = $("toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), ms);
}

// 设置标题文本但保留 #chev 徽标
function setTitle(text) {
  const h = $("title");
  h.firstChild.textContent = text;
}

// 上下文用量：常显标签已按需求移除，只留数据入口（记在 app.ctxPct，将来做逼近上限预警可用）
function setCtx(info) {
  const total = info?.total_token_usage?.total_tokens;
  const win = info?.model_context_window;
  if (!total || !win) return;
  app.ctxPct = Math.min(100, Math.round((total / win) * 100));
}

// 轮次结束后回填会话名（codex 首轮后才起名，"新会话"要变成真名）。防抖：快照回放只触发一次
function refreshTitle() {
  if (app.isViewer) return; // 观众无 sessions.list 权限；会话名来自 auth 的 sessionName
  if (app.titleTimer) clearTimeout(app.titleTimer);
  app.titleTimer = setTimeout(async () => {
    app.titleTimer = null;
    if (app.view !== "session" || !app.currentId) return;
    try {
      const { sessions } = await app.session.request("sessions.list", { limit: 50 });
      app.lastSessions = sessions;
      updateStatusPill(); // 深链直进会话时 lastSessions 原本为空，此刻才能补出项目名
      const s = sessions.find((x) => x.id === app.currentId);
      const name = s?.name || s?.preview?.slice(0, 24);
      if (name && name !== app.currentTitle) {
        app.currentTitle = name;
        app.sessionNames.set(app.currentId, name);
        setTitle(name);
        localStorage.setItem("czr-last", JSON.stringify({ id: app.currentId, title: name }));
      }
    } catch {}
  }, 600);
}

function relTime(sec) {
  if (!sec) return "";
  const d = Date.now() / 1000 - sec;
  if (d < 60) return "刚刚";
  if (d < 3600) return `${Math.floor(d / 60)} 分钟前`;
  if (d < 86400) return `${Math.floor(d / 3600)} 小时前`;
  if (d < 7 * 86400) return `${Math.floor(d / 86400)} 天前`;
  return new Date(sec * 1000).toLocaleDateString();
}

// 智能滚动：只在用户本就贴近底部时跟随新内容，翻历史不被打断；
// 离底时显示「↓」浮动按钮
function nearBottom() {
  return window.innerHeight + window.scrollY >= document.body.scrollHeight - 160;
}
function scrollToBottom() {
  window.scrollTo(0, document.body.scrollHeight);
}
function updateJump() {
  $("jump").classList.toggle("show", app.view === "session" && !nearBottom());
}

// —— 状态胶囊 + 分层连接诊断 ——
// 胶囊只显示"最深的断层"；点开弹层看三层各自的状态与建议
function updateStatusPill() {
  if (app.viewerEnded) return; // 围观终态：pill 固定「已结束」，不被连接层状态覆盖
  const el = $("status");
  el.className = "";
  if (net.link === "connecting") {
    el.textContent = "连接中…";
  } else if (net.link === "down") {
    el.textContent = "重连中…";
    el.className = "down";
  } else if (net.daemon === false) {
    el.textContent = "电脑离线";
    el.className = "down";
  } else if (net.engine === "down") {
    el.textContent = "Codex 重启中";
    el.className = "warn";
  } else if (net.daemon === true) {
    // 一切正常：首页副标题是电脑名；会话页对标官方 App 的「项目文件夹 · 机器名」
    const dir = sessionDirLabel();
    const pc = app.session?.info.name || "已连接";
    el.textContent = dir ? `${dir} · ${pc}` : pc;
    el.className = "online";
  } else {
    el.textContent = "连接中…";
  }
  // 离线时禁用发送并在占位符里说明，而不是发送后才报错
  const offline = net.link !== "ok" || net.daemon === false;
  $("send").disabled = offline;
  $("input").placeholder = offline ? "电脑离线，恢复后才能发送" : "给 Codex 发消息…";
  if ($("diagsheet").classList.contains("open")) renderDiag();
}

// 会话页副标题的项目名：当前会话 cwd 的目录名。托管聊天目录（目录名=聊天名，
// 非用户项目）不展示，避免和标题重复
function sessionDirLabel() {
  if (app.view !== "session" || !app.currentId) return "";
  const s = app.lastSessions.find((x) => x.id === app.currentId);
  const cwd = s?.cwd || "";
  if (!cwd || isManagedChatDir(cwd)) return "";
  return cwd.split(/[\\/]/).pop() || "";
}

function diagRow(state, title, sub) {
  const row = document.createElement("div");
  row.className = "drow";
  row.style.cursor = "default";
  const dot = document.createElement("span");
  dot.className = `ddot${state ? ` ${state}` : ""}`;
  const main = document.createElement("div");
  main.className = "dname";
  const t = document.createElement("div");
  t.textContent = title;
  const d = document.createElement("div");
  d.className = "dsub wrap";
  d.textContent = sub;
  main.append(t, d);
  row.append(dot, main);
  return row;
}

function renderDiag() {
  const box = $("diaglist");
  box.innerHTML = "";
  const relayHost = (app.session?.info.relay || "").replace(/^wss?:\/\//, "").replace(/[/?#].*$/, "");
  const pcName = app.session?.info.name || "电脑";

  // 1. 手机 ↔ 中继
  if (net.link === "ok") {
    box.appendChild(diagRow("ok", "手机 ↔ 中继", `已连接${relayHost ? ` · ${relayHost}` : ""}`));
  } else if (net.link === "connecting") {
    box.appendChild(diagRow("", "手机 ↔ 中继", "连接中…"));
  } else {
    box.appendChild(diagRow("down", "手机 ↔ 中继",
      "已断开，正在自动重连。请检查手机网络；自建中继需确认中继服务在运行"));
  }

  // 2. 中继 ↔ 电脑
  if (net.link !== "ok") {
    box.appendChild(diagRow("", `中继 ↔ ${pcName}`, "未知：先恢复与中继的连接"));
  } else if (net.daemon === true) {
    box.appendChild(diagRow("ok", `中继 ↔ ${pcName}`, "在线"));
  } else if (net.daemon === false) {
    const seen = net.lastSeen ? `上次在线：${relTime(net.lastSeen / 1000)}。` : "";
    box.appendChild(diagRow("down", `中继 ↔ ${pcName}`,
      `离线。${seen}电脑可能睡眠、关机，或后台服务（daemon）未运行`));
  } else {
    box.appendChild(diagRow("", `中继 ↔ ${pcName}`, "等待状态…"));
  }

  // 3. Codex 主程序（电脑上真正跑对话的 Codex 程序）
  if (net.link !== "ok" || net.daemon !== true) {
    box.appendChild(diagRow("", "Codex 主程序", "未知：电脑在线后可见"));
  } else if (net.engine === "down") {
    box.appendChild(diagRow("warn", "Codex 主程序", "已退出，电脑端正在自动重启，稍候自动恢复"));
  } else if (net.engine === "ok") {
    box.appendChild(diagRow("ok", "Codex 主程序", "运行正常"));
  } else {
    // 已连上且鉴权成功，但电脑端 Remote 较旧、没带运行状态字段——程序其实在跑
    box.appendChild(diagRow("ok", "Codex 主程序", "运行中（旧版电脑端未上报详细状态）"));
  }
}

function openDiag() {
  if (!app.session) return; // 未配对时无从诊断
  renderDiag();
  $("diagsheet").classList.add("open");
}

// —— 列表页：状态看板 ——
function sessionRow(s, inproj = false) {
  const busy = s.running || s.active;
  const row = document.createElement("div");
  row.className = `row${s.approvals ? " appr" : ""}${inproj ? " inproj" : ""}`;
  const dot = document.createElement("span");
  dot.className = `dot${s.approvals ? " appr" : busy ? " run" : ""}`;
  const main = document.createElement("div");
  main.className = "rowmain";
  const title = document.createElement("div");
  title.className = "rowtitle";
  title.textContent = s.name || s.preview || "（无标题）";
  main.appendChild(title);
  // 有正式名字时，最后进展摘要单独一行（一眼知道聊到哪了）
  if (s.name && s.preview && s.preview !== s.name) {
    const snip = document.createElement("div");
    snip.className = "rowsnip";
    snip.textContent = s.preview;
    main.appendChild(snip);
  }
  const sub = document.createElement("div");
  sub.className = "rowsub";
  if (s.approvals) {
    const st = document.createElement("span");
    st.className = "st appr";
    st.textContent = "等待审批";
    sub.appendChild(st);
  } else if (busy) {
    const st = document.createElement("span");
    st.className = "st run";
    st.textContent = "运行中";
    sub.appendChild(st);
  }
  // 项目分组里目录是组头信息，行内不再重复；托管的每聊天目录名（new-chat-7…）无意义也不显示。
  // split 用 [\\/] 兼容 Windows 反斜杠路径，否则会把整条 C:\…\x 当成 basename。
  const dir = (inproj || isManagedChatDir(s.cwd)) ? "" : (s.cwd || "").split(/[\\/]/).pop() || s.cwd || "";
  const rest = [dir, relTime(s.updatedAt)].filter(Boolean).join(" · ");
  if (rest) sub.appendChild(document.createTextNode(`${sub.childNodes.length ? " · " : ""}${rest}`));
  main.appendChild(sub);
  row.append(dot, main);
  row.onclick = () => openSession(s.id, s.name || s.preview?.slice(0, 24) || "会话");
  return row;
}

// 看板：需要注意的事置顶（审批 > 运行），其余按组织方式排布（按项目 / 时间线）
function renderList(sessions) {
  // 引擎 thread/list 的顺序不保证按最后更新排（实测有旧会话排前），显示前强制按新→旧
  sessions = [...sessions].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  app.sessionNames = new Map(sessions.map((s) => [s.id, s.name || s.preview?.slice(0, 24) || "会话"]));
  app.lastSessions = sessions;
  // 搜索：按名称/摘要/目录过滤（大字状态行仍统计全量）
  const q = app.filter.trim().toLowerCase();
  const visible = q
    ? sessions.filter((s) => `${s.name ?? ""} ${s.preview ?? ""} ${s.cwd ?? ""}`.toLowerCase().includes(q))
    : sessions;
  const list = $("list");
  list.innerHTML = "";

  // 大字状态行只在有事发生时出现（对标官方的安静首页）
  const apprN = sessions.filter((s) => s.approvals).length;
  const runN = sessions.filter((s) => !s.approvals && (s.running || s.active)).length;
  if (apprN || runN) {
    const headline = document.createElement("div");
    headline.id = "headline";
    if (apprN) {
      headline.className = "warn";
      headline.textContent = `${apprN} 个会话在等你审批`;
      if (runN) {
        const sub = document.createElement("span");
        sub.className = "sub";
        sub.textContent = `另有 ${runN} 个任务在运行`;
        headline.appendChild(sub);
      }
    } else {
      headline.textContent = `${runN} 个任务正在运行`;
    }
    list.appendChild(headline);
  }

  const attention = visible.filter((s) => s.approvals || s.running || s.active);
  const rest = visible.filter((s) => !attention.includes(s));
  attention.sort((a, b) => (b.approvals || 0) - (a.approvals || 0));

  if (attention.length) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = "进行中";
    list.appendChild(h);
    for (const s of attention) list.appendChild(sessionRow(s));
  }

  if (app.organize === "proj") {
    renderProjects(list, rest);
  } else {
    // 时间线：继续上次打开的会话（不在"进行中"里时才显示，避免重复）
    const last = JSON.parse(localStorage.getItem("czr-last") || "null");
    const lastSession = last && !attention.some((s) => s.id === last.id)
      ? rest.find((s) => s.id === last.id) : null;
    const h2 = document.createElement("div");
    h2.className = "secthead";
    h2.textContent = "最近";
    list.appendChild(h2);
    if (lastSession) {
      const r = sessionRow(lastSession);
      r.querySelector(".rowsub").prepend(document.createTextNode("上次查看 · "));
      list.appendChild(r);
    }
    for (const s of rest) {
      if (lastSession && s.id === lastSession.id) continue;
      list.appendChild(sessionRow(s));
    }
  }
  if (!visible.length) {
    const n = document.createElement("div");
    n.className = "notice";
    n.textContent = q ? "没有匹配的会话" : "还没有会话——点右下角「新会话」，让电脑开始干活";
    list.appendChild(n);
  }
}

  const dark = "#171b22", light = "#ffffff";
  $("mtcdark").content = mode === "light" ? light : dark;
  $("mtclight").content = mode === "dark" ? dark : light;
}

// 归一路径分隔符为 /、去尾分隔符，让同一套规则同时匹配 Windows(\) 与 POSIX(/)。
function normSep(cwd) {
  return (cwd || "").trim().replace(/[\\/]+$/, "").replace(/\\/g, "/");
}
// 桌面版 Codex 给每个新聊天在 <家>/Documents/Codex/<日期>/<聊天名> 建的托管目录：
// 目录名是聊天名（new-chat-7、csv-markdown…）而非用户项目，既不该进"项目"，
// 行内副标题也不该重复展示这个目录名。
function isManagedChatDir(cwd) {
  return /(?:^|\/)Documents\/Codex(?:\/|$)/i.test(normSep(cwd));
}

// "项目"只留真正的工作目录，其余算散聊天：
// - 桌面版 Codex 托管的每聊天目录（见 isManagedChatDir）
// - 家目录本身、桌面/文档/下载、临时目录、盘符根/根目录
// 分隔符与大小写均归一，兼容 Windows(C:\Users\…\Documents\Codex) 与 POSIX(/Users、/home)。
function isProjectDir(cwd) {
  const p = normSep(cwd);
  if (!p || p === "/" || p === "/root" || /^[a-z]:$/i.test(p)) return false; // 根 / 盘符根
  if (isManagedChatDir(p)) return false;                                     // Documents/Codex 托管目录
  if (/^(?:[a-z]:)?\/(?:Users|home)\/[^/]+$/i.test(p)) return false;         // 家目录本身
  if (/^(?:[a-z]:)?\/(?:Users|home)\/[^/]+\/(?:Desktop|Documents|Downloads)$/i.test(p)) return false;
  if (/^(?:\/private)?\/tmp(?:\/|$)/i.test(p) || /^\/var(?:\/|$)/i.test(p)) return false; // POSIX 临时
  if (/\/AppData\/Local\/Temp(?:\/|$)/i.test(p) || /^[a-z]:\/Windows\/Temp(?:\/|$)/i.test(p)) return false; // Windows 临时
  return true;
}

function renderProjects(list, sessions) {
  const groups = new Map(); // cwd -> 会话数组（sessions.list 已按新旧排序，组内沿用）
  const chats = [];         // 非项目目录的散聊天，平铺在项目区之后
  for (const s of sessions) {
    const cwd = (s.cwd || "").trim();
    if (!isProjectDir(cwd)) { chats.push(s); continue; }
    if (!groups.has(cwd)) groups.set(cwd, []);
    groups.get(cwd).push(s);
  }
  if (groups.size) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = "项目";
    list.appendChild(h);
  }
  for (const [cwd, items] of groups) {
    const closed = !app.expanded.has(cwd);
    const head = document.createElement("div");
    head.className = "proj";
    head.innerHTML = FOLDER_SVG;
    const name = document.createElement("span");
    name.className = "pname";
    name.textContent = cwd.split(/[\\/]/).pop() || cwd;
    const chev = document.createElement("span");
    chev.className = "pchev";
    chev.textContent = closed ? "▸" : "▾";
    head.append(name, chev);
    const add = document.createElement("button");
    add.className = "pnew";
    add.innerHTML = COMPOSE_SVG;
    add.setAttribute("aria-label", `在 ${name.textContent} 新建会话`);
    add.onclick = (e) => {
      e.stopPropagation();
      if (net.link !== "ok" || net.daemon === false) { showBanner("电脑离线，暂时无法新建会话"); return; }
      createSession(cwd);
    };
    head.appendChild(add);
    head.onclick = () => {
      if (app.expanded.has(cwd)) app.expanded.delete(cwd);
      else app.expanded.add(cwd);
      localStorage.setItem("czr-expanded", JSON.stringify([...app.expanded]));
      renderList(app.lastSessions);
    };
    list.appendChild(head);
    if (!closed) for (const s of items) list.appendChild(sessionRow(s, true));
  }
  if (chats.length) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = "对话"; // 与桌面版侧栏的分区文案一致
    list.appendChild(h);
    for (const s of chats) list.appendChild(sessionRow(s, true));
  }
}

async function refreshList() {
  const { sessions } = await app.session.request("sessions.list", { limit: 50 });
  renderList(sessions);
}

// 看板变化时节流刷新（仅列表视图）
function scheduleListRefresh() {
  if (app.view !== "list" || app.refreshTimer) return;
  app.refreshTimer = setTimeout(() => {
    app.refreshTimer = null;
    if (app.view === "list") refreshList().catch(() => {});
  }, 800);
}

async function openSession(id, title, opts = {}) {
  // 手机系统返回键/右滑返回走浏览器 history：从列表进会话时压一条历史，
  // 这样系统返回会触发 popstate 回首页，而不是把整个页面/PWA 弹掉。
  // 已在会话内（如右上角新建会话）不重复压栈——始终只留一条“会话→首页”的返回。
  // 观众深链直进会话、无列表可回，不压栈（返回键走首页同款"再按一次退出"）。
  if (app.view !== "session" && !app.isViewer) history.pushState({ czr: "session" }, "");
  app.view = "session";
  app.currentId = id;
  app.currentTitle = title;
  // 新建的空会话在发出第一条消息前没有 rollout 文件，无法 watch（会 404「会话不存在」）；
  // 先进视图并标记待接入，等 dispatch 发出首条消息后再补 watch
  app.pendingWatch = !!opts.fresh;
  app.running = false;
  app.echoes = [];
  app.toolNodes.clear();
  app.seenImages.clear();
  app.sawFunctionCalls = false;
  app.stream = null;
  app.proc = null;
  // 每次进会话把历史回填窗口复位（首屏与 daemon watch 的 SNAPSHOT_MAX_ITEMS 一致）
  app.histLimit = 200;
  app.histTotal = 0;
  app.loadingEarlier = false;
  app.earlierAnchor = null;
  app.replayMode = false;
  app.replayDone = false;
  app.replayLoading = false;
  app.viewerCount = 0;
  app.congestedShown = false;
  updateReplayMore();
  resetPullTip();
  app.ctxPct = null; // 用量随本会话的 token_count 事件回填
  $("input").value = app.drafts.get(id) ?? ""; // 恢复本会话的未发送草稿
  app.attachments = [];
  app.queue = [];
  renderAttachments();
  setPlanMode(false); // 计划模式是会话级选择，不跨会话
  autoGrow();
  updateSendState();
  localStorage.setItem("czr-last", JSON.stringify({ id, title }));
  document.body.classList.add("insession");
  $("list").classList.add("hidden");
  $("viewer").classList.add("active");
  $("composer").classList.add("active");
  if (!app.isViewer) $("back").style.display = "flex";
  setTitle(title);
  updateStatusPill(); // 副标题切到「项目文件夹 · 电脑名」
  $("log").innerHTML = opts.fresh ? "" : '<div class="notice">加载中…</div>';
  setRunning(false);
  // 看板的 running 是"daemon 正在驱动"的权威标志：新开页面没有 live 事件回放，
  // 只靠 tail 推断会把 daemon 驱动误判成桌面驱动（丢失停止按钮）
  const known = app.lastSessions.find((s) => s.id === id);
  if (known?.running) setRunning(true, "daemon");
  renderApprovals(); // 该会话的待审批卡从全局区移入对话流
  if (opts.fresh) return; // 空会话：暂不 watch，首条消息发出后由 dispatch 接入
  try {
    // 观众带 fromStart：已结束的会话从头顺序读（分享跑完的会话是主场景），
    // 进行中的会话 daemon 会忽略之、回落尾部实时（mode:"tail"）。旧 daemon 无 mode 字段同理。
    const r = await app.session.request("session.watch",
      app.isViewer ? { sessionId: id, fromStart: true } : { sessionId: id });
    if (r?.mode === "replay") {
      app.replayMode = true;
      if (typeof r.total === "number") app.histTotal = r.total;
    }
  } catch (err) {
    if (app.isViewer) {
      $("log").innerHTML = "";
      showViewerEnded("会话已不存在或暂不可用");
      return;
    }
    // 会话可能已被清理（深链/继续上次都可能指向失效 id）：报错并退回列表
    showBanner(`打开会话失败：${err.message}`);
    history.back(); // 消费掉刚压入的历史项，经 popstate 统一走 closeSession
  }
}

async function closeSession() {
  // 未发送的草稿存起来（排队未发出的文本一并并入），回来接着写；不带进下一个会话
  if (app.currentId) {
    const queued = app.queue.map((q) => q.text).filter(Boolean);
    app.drafts.set(app.currentId,
      [$("input").value, ...queued].filter((s) => s.trim()).join("\n"));
  }
  app.queue = [];
  app.attachments = [];
  renderAttachments();
  $("input").value = "";
  autoGrow();
  updateSendState();
  app.view = "list";
  app.currentId = null;
  app.echoes = [];
  app.toolNodes.clear();
  app.stream = null;
  app.proc = null;
  app.viewerCount = 0;
  setRunning(false);
  updateJump();
  document.body.classList.remove("insession");
  $("viewer").classList.remove("active");
  $("composer").classList.remove("active");
  $("log").innerHTML = "";
  $("list").classList.remove("hidden");
  $("back").style.display = "none";
  setTitle("C叉叉");
  updateStatusPill(); // 副标题退回电脑名
  renderApprovals();
  // 网络动作放到视图切换之后、且不阻塞返回：unwatch 只是通知 daemon 停止推流，
  // 就算失败也已离开会话；迟到的 live 事件因 currentId 已清空会被忽略。
  app.session.request("session.unwatch").catch(() => {});
  await refreshList().catch(() => {});
}

// 运行状态区分驱动方：daemon（手机发起，可停止）/ desktop（桌面 GUI 在跑，只可看，
// daemon 停不了别人的进程——tail 的 task_started 只在非 daemon 驱动时判为桌面）
function setRunning(running, driver = "daemon", startAt) {
  if (running && !app.running) app.runStart = startAt ?? Date.now();
  else if (running && startAt) app.runStart = Math.min(app.runStart, startAt);
  app.running = running;
  app.driver = running ? driver : null;
  // 观众身份栏的运行脉冲：实时围观的核心反馈（观众端的 composer 卡整体隐藏）
  if (app.isViewer) $("vrun").style.display = running ? "inline-flex" : "";
  const stoppable = running && driver === "daemon";
  // 运行中排队追加仍可用：输入为空时只显示停止 ■，写了内容 ↑ 才出现（updateSendState 统一管）
  $("stop").style.display = stoppable ? "block" : "none";
  $("input").placeholder = stoppable ? "追加消息，本轮结束后发送…" : "给 Codex 发消息…";
  updateSendState();
  // 运行提示由 log 顶部的状态条承担（含驱动方与耗时），操作排的 runhint 只留给"正在停止…"反馈
  $("runhint").style.display = "none";
  // 运行中每秒刷新状态条的耗时
  if (running && !app.runTimer) {
    app.runTimer = setInterval(updateStatusStrip, 1000);
  } else if (!running && app.runTimer) {
    clearInterval(app.runTimer);
    app.runTimer = null;
  }
  updateStatusStrip();
  if (!running) flushQueue();
}

// rollout tail 里的轮次事件：桌面 GUI 驱动的会话没有 live 事件，
// 运行状态只能从这里推断（daemon 驱动时 live 先到、driver 已是 daemon，不降级）
function tailRunning(on, startedAtSec) {
  if (on) {
    const driver = app.running && app.driver === "daemon" ? "daemon" : "desktop";
    setRunning(true, driver, startedAtSec ? startedAtSec * 1000 : undefined);
  } else {
    setRunning(false);
  }
}

function fmtDur(ms) {
  const s = Math.floor(ms / 1000);
  return s < 60 ? `${s} 秒` : `${Math.floor(s / 60)} 分 ${String(s % 60).padStart(2, "0")} 秒`;
}

// 会话页状态条：等待审批 > 运行中（含耗时） > 有人围观 > 隐藏
function updateStatusStrip() {
  const el = $("sstatus");
  const hasApproval = [...app.approvals.values()].some((p) => p.sessionId === app.currentId);
  // 分享者可见的围观人数（观众端在身份栏显示同场人数，不占状态条）
  const watching = !app.isViewer && (app.viewerCount ?? 0) > 0 ? `${app.viewerCount} 人围观中` : "";
  if (hasApproval) {
    el.className = "appr";
    el.style.display = "block";
    el.textContent = "Codex 在等你的审批";
  } else if (app.running) {
    el.className = "";
    el.style.display = "block";
    el.innerHTML = '<span class="pulse"></span>';
    const who = app.driver === "desktop" ? "桌面端正在运行" : "Codex 正在工作…";
    el.appendChild(document.createTextNode(
      `${who} ${fmtDur(Date.now() - app.runStart)}${watching ? ` · ${watching}` : ""}`));
  } else if (watching) {
    el.className = "";
    el.style.display = "block";
    el.textContent = `👀 ${watching}`;
  } else {
    el.style.display = "none";
  }
}

// —— 乐观发送：立即渲染带"发送中"态的用户气泡，等 rollout tail 确认后去重 ——
function echoBubble(text, atts = []) {
  const msg = document.createElement("div");
  msg.className = "msg user";
  const col = document.createElement("div");
  col.className = "echocol";
  if (atts.length) {
    const row = document.createElement("div");
    row.className = "echoimgs";
    for (const a of atts) {
      const img = document.createElement("img");
      img.src = `data:${a.mime};base64,${a.b64}`;
      row.appendChild(img);
    }
    col.appendChild(row);
  }
  if (text) {
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = clip(text);
    col.appendChild(b);
  }
  const note = document.createElement("div");
  note.className = "qtag";
  note.style.display = "none";
  col.appendChild(note);
  msg.appendChild(col);
  return msg;
}

function setEchoNote(el, text) {
  const note = el.querySelector(".qtag");
  if (!note) return;
  note.textContent = text;
  note.style.display = text ? "block" : "none";
}

function addEcho(text, atts = []) {
  const msg = echoBubble(text, atts);
  msg.classList.add("pending");
  $("log").appendChild(msg);
  app.echoes.push({ text, imgs: atts.length > 0, el: msg });
  scrollToBottom();
  return msg;
}

function consumeEcho(text) {
  const idx = app.echoes.findIndex((e) => e.text.trim() === text.trim());
  if (idx === -1) return false;
  app.echoes[idx].el.remove();
  app.echoes.splice(idx, 1);
  return true;
}

// 纯图片消息没有文本可匹配：tail 的用户图片气泡到达时，摘掉最早的图片乐观气泡
function consumeImgEcho() {
  const idx = app.echoes.findIndex((e) => !e.text && e.imgs);
  if (idx === -1) return;
  app.echoes[idx].el.remove();
  app.echoes.splice(idx, 1);
}

function dropEcho(el) {
  const idx = app.echoes.findIndex((e) => e.el === el);
  if (idx !== -1) app.echoes.splice(idx, 1);
  el.remove();
}

async function sendMessage() {
  const input = $("input");
  const text = input.value.trim();
  const atts = app.attachments.slice();
  if ((!text && !atts.length) || !app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) {
    showBanner("电脑离线，暂时无法发送（输入内容已保留）");
    return;
  }
  input.value = "";
  app.attachments = [];
  renderAttachments();
  autoGrow();
  updateSendState();
  // daemon 驱动运行中：进本地队列，本轮结束后自动发出（点气泡可撤回）
  if (app.running && app.driver === "daemon") {
    enqueue(text, atts);
    return;
  }
  await dispatch(text, atts);
}

async function dispatch(text, atts) {
  const echo = addEcho(text, atts);
  setRunning(true);
  try {
    const images = [];
    for (let i = 0; i < atts.length; i++) {
      setEchoNote(echo, `上传图片 ${i + 1}/${atts.length}…`);
      images.push(await uploadImage(atts[i]));
    }
    setEchoNote(echo, "");
    // 首条消息含 resume + 模型初始化，可能较慢
    await app.session.request("session.send", {
      sessionId: app.currentId, text,
      images: images.length ? images : undefined,
      options: turnOptions(), // 按轮权限/模型 override（默认不传，沿用电脑配置）
    }, 90000);
    if (app.pendingWatch) {
      // 空会话首条消息已发出 → rollout 文件已生成，现在接入流式与历史
      app.pendingWatch = false;
      try { await app.session.request("session.watch", { sessionId: app.currentId }); }
      catch (e) { showBanner(`会话接入失败：${e.message}`); }
    }
  } catch (err) {
    setRunning(false);
    dropEcho(echo);
    const input = $("input");
    if (text && !input.value.trim()) { // 失败不吞输入，放回输入框（但不覆盖此间新输入的内容）
      input.value = text;
      autoGrow();
    }
    if (atts.length && !app.attachments.length) {
      app.attachments = atts;
      renderAttachments();
    }
    updateSendState();
    showBanner(/未知方法/.test(err.message)
      ? "电脑端 Remote 程序是旧版本，不支持发送图片——在电脑上重启它即可"
      : `发送失败：${err.message}`);
  }
}

// —— 运行中排队：轮次结束（setRunning(false)）后逐条发出 ——
function enqueue(text, atts) {
  const msg = echoBubble(text, atts);
  msg.classList.add("queued");
  setEchoNote(msg, "本轮结束后发送 · 点按撤回");
  $("log").appendChild(msg);
  scrollToBottom();
  const q = { text, atts, el: msg };
  msg.onclick = () => { // 撤回：内容放回输入框/附件区
    const i = app.queue.indexOf(q);
    if (i === -1) return;
    app.queue.splice(i, 1);
    msg.remove();
    const input = $("input");
    if (text) input.value = input.value.trim() ? `${input.value}\n${text}` : text;
    app.attachments = app.attachments.concat(atts).slice(0, MAX_ATTACH);
    renderAttachments();
    autoGrow();
    updateSendState();
  };
  app.queue.push(q);
}

let flushing = false;
async function flushQueue() {
  if (flushing || !app.queue.length) return;
  if (app.view !== "session" || !app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) return; // 离线保持排队
  flushing = true;
  const q = app.queue.shift();
  q.el.remove();
  try {
    await dispatch(q.text, q.atts); // 失败时 dispatch 已回填输入框；剩余的继续排队
  } finally {
    flushing = false;
  }
}

// —— 图片附件：选图/拍照 -> 压缩 -> 缩略图预览 -> 分块上传 ——
const MAX_ATTACH = 4;

function renderAttachments() {
  const row = $("attachrow");
  row.innerHTML = "";
  row.classList.toggle("on", app.attachments.length > 0);
  app.attachments.forEach((a, i) => {
    const box = document.createElement("div");
    box.className = "att";
    const img = document.createElement("img");
    img.src = `data:${a.mime};base64,${a.b64}`;
    const del = document.createElement("button");
    del.setAttribute("aria-label", "移除图片");
    del.textContent = "✕";
    del.onclick = () => {
      app.attachments.splice(i, 1);
      renderAttachments();
      updateSendState();
    };
    box.append(img, del);
    row.appendChild(box);
  });
}

function updateSendState() {
  const empty = !$("input").value.trim() && !app.attachments.length;
  $("send").disabled = empty;
  // 运行中只留一个按钮位：没内容时是停止 ■，写了要追加的内容 ↑ 才出现（单槽位，不摆两个按钮）
  const stoppable = app.running && app.driver === "daemon";
  $("send").style.display = stoppable && empty ? "none" : "";
}

// —— 计划模式 / 会话目标 / 发文件（对齐官方 Codex App 的 ➕ 菜单）——
function setPlanMode(on) {
  app.planMode = on;
  $("planck").textContent = on ? "✓" : "";
  $("planpill").style.display = on ? "" : "none";
}

// 目标：thread/goal/set|get 的手机入口。prompt 回显当前目标，清空即移除
async function editGoal() {
  if (!app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) {
    showBanner("电脑离线，暂时无法设定目标");
    return;
  }
  let current = "";
  try {
    const r = await app.session.request("goal.get", { sessionId: app.currentId });
    current = r.goal ?? "";
  } catch {} // 旧 daemon / 旧引擎拿不到就从空开始
  const goal = prompt("会话目标（Codex 会持续朝它推进；清空则移除）：", current);
  if (goal === null) return;
  try {
    await app.session.request("goal.set", { sessionId: app.currentId, goal: goal.trim() });
    showBanner(goal.trim() ? "目标已设定" : "目标已移除");
    setTimeout(() => showBanner(""), 2500);
  } catch (err) {
    showBanner(/未知方法/.test(err.message)
      ? "电脑端 Remote 程序是旧版本，不支持目标——在电脑上重启它即可"
      : `设定目标失败：${err.message}`);
  }
}

// 发文件：文本文件读入后以代码块拼进消息（引擎输入模态只有文本+图片，
// 二进制文档发不了；图片则自动转走图片管线）
async function attachTextFile(file) {
  if (file.type.startsWith("image/")) {
    await pickFiles([file]);
    return;
  }
  const MAX = 64_000;
  const text = await file.text();
  if (text.includes("\u0000")) {
    showBanner("这是二进制文件，发不了——只支持文本文件和图片");
    return;
  }
  if (text.length > MAX) {
    showBanner("文件超过 64KB，请截取需要的部分，或直接在消息里告诉 Codex 文件路径");
    return;
  }
  const input = $("input");
  const block = `[文件 ${file.name}]\n\`\`\`\n${text}\n\`\`\``;
  input.value = input.value.trim() ? `${input.value.trimEnd()}\n\n${block}` : block;
  autoGrow();
  updateSendState();
}

// 剪贴板贴图：手机上「截图 → 复制 → 贴给 Codex」是高频路径
async function pasteImage() {
  if (!navigator.clipboard?.read) {
    showBanner("此浏览器不支持读取剪贴板图片，请用「选照片」");
    return;
  }
  try {
    const items = await navigator.clipboard.read();
    let found = false;
    for (const it of items) {
      const type = it.types.find((t) => t.startsWith("image/"));
      if (!type) continue;
      const blob = await it.getType(type);
      await pickFiles([new File([blob], "clipboard", { type })]);
      found = true;
    }
    if (!found) showBanner("剪贴板里没有图片");
  } catch {
    showBanner("无法读取剪贴板（未授权或已为空）");
  }
}

async function pickFiles(files) {
  for (const f of files) {
    if (app.attachments.length >= MAX_ATTACH) {
      showBanner(`一次最多发送 ${MAX_ATTACH} 张图片`);
      break;
    }
    try {
      app.attachments.push(await compressImage(f));
    } catch {
      showBanner(`无法读取图片：${f.name || "未知格式"}`);
    }
  }
  renderAttachments();
  updateSendState();
}

// 手机原图动辄 3-12MB：长边压到 1568px、JPEG 0.85（模型看图够用）；
// 小图（<300KB 且格式友好）原样直传，保住截图里的文字清晰度
async function compressImage(file) {
  if (file.size <= 300 * 1024 && /^image\/(png|jpeg|webp|gif)$/.test(file.type)) {
    return { b64: await fileToB64(file), mime: file.type };
  }
  const bmp = await loadBitmap(file);
  const w = bmp.width || bmp.naturalWidth;
  const h = bmp.height || bmp.naturalHeight;
  const scale = Math.min(1, 1568 / Math.max(w, h));
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(w * scale));
  canvas.height = Math.max(1, Math.round(h * scale));
  canvas.getContext("2d").drawImage(bmp, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
  return { b64: dataUrl.slice(dataUrl.indexOf(",") + 1), mime: "image/jpeg" };
}

async function loadBitmap(file) {
  try {
    return await createImageBitmap(file);
  } catch { // 部分格式（如旧 Safari 的 HEIC）走 <img> 解码兜底
    const url = URL.createObjectURL(file);
    try {
      const img = new Image();
      img.src = url;
      await img.decode();
      return img;
    } finally {
      URL.revokeObjectURL(url);
    }
  }
}

function fileToB64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const s = String(r.result);
      resolve(s.slice(s.indexOf(",") + 1));
    };
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

// —— 按轮权限/模型选择（对标 Claude App composer 的操作排）——
// 权限预设与桌面端一致（bundle 证实的 turn/start 字段）：sandboxPolicy 是 {type} 对象
const PERM_PRESETS = [
  { key: "default", name: "跟随电脑配置", desc: "沿用会话与 config.toml 的既有审批/沙箱设置" },
  { key: "readonly", name: "只读", desc: "只能读文件，任何改动与命令都逐次审批" },
  { key: "auto", name: "代理", desc: "工作区内可写可执行，出界操作需审批" },
  { key: "full", name: "完全访问", desc: "跳过审批直接执行任何命令（高风险）", warn: true },
];
// 权限胶囊只显图标（对标官方 App）；具体档位靠图标区分，红边叠加警示完全访问。
// 线性图标（lucide，MIT）：shield=默认 / lock=只读 / zap=代理 / triangle-alert=完全访问。
// stroke=currentColor 继承按钮的点亮(.set)与警示(.warn)变色；尺寸由 CSS 控制。
const SVG = (body) =>
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
const PERM_ICON = {
  default: SVG(`<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>`),
  readonly: SVG(`<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>`),
  auto: SVG(`<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>`),
  full: SVG(`<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/>`),
};
const EFFORT_ZH = { low: "低", medium: "中", high: "高", xhigh: "超高" };

// 模型简写：取带小数点的版本号（gpt-5.5-codex -> 5.5），没有就剥掉厂商前缀原样显示
function shortModel(name) {
  const s = String(name || "").trim();
  const m = s.match(/\d+\.\d+/);
  return m ? m[0] : s.replace(/^(gpt|codex|openai)[-_ ]/i, "");
}

function loadTurnOpts() {
  const base = { perm: "default", model: null, modelName: null, effort: null };
  try {
    return { ...base, ...JSON.parse(localStorage.getItem("czr-turnopts") || "{}") };
  } catch {
    return base;
  }
}

function saveTurnOpts() {
  localStorage.setItem("czr-turnopts", JSON.stringify(app.turnOpts));
}

// session.send 的 options：default/未选模型时不传字段，daemon 沿用既有配置
function turnOptions() {
  const o = {};
  if (app.planMode) o.plan = true; // daemon 展开为 collaborationMode {mode:"plan"}
  const p = app.turnOpts.perm;
  if (p === "readonly") { o.approvalPolicy = "on-request"; o.sandboxPolicy = { type: "readOnly" }; }
  else if (p === "auto") { o.approvalPolicy = "on-request"; o.sandboxPolicy = { type: "workspaceWrite" }; }
  else if (p === "full") { o.approvalPolicy = "never"; o.sandboxPolicy = { type: "dangerFullAccess" }; }
  if (app.turnOpts.model) {
    o.model = app.turnOpts.model;
    if (app.turnOpts.effort) o.effort = app.turnOpts.effort;
  }
  return Object.keys(o).length ? o : undefined;
}

function updateOptButtons() {
  const pb = $("permbtn");
  pb.innerHTML = PERM_ICON[app.turnOpts.perm] ?? PERM_ICON.default;
  const preset = PERM_PRESETS.find((p) => p.key === app.turnOpts.perm);
  pb.setAttribute("aria-label", `本轮权限：${preset?.name ?? "跟随电脑配置"}`);
  pb.classList.toggle("set", app.turnOpts.perm !== "default");
  pb.classList.toggle("warn", app.turnOpts.perm === "full");
  const mb = $("modelbtn");
  // 未按轮指定时显示电脑端默认模型；列表还没取到（或旧 daemon）给"模型"占位
  const explicit = !!app.turnOpts.model;
  const def = app.models?.find((m) => m.isDefault) ?? app.models?.[0];
  const name = explicit ? (app.turnOpts.modelName || app.turnOpts.model) : (def?.name || def?.id);
  mb.classList.toggle("ph", !name);
  if (!name) { mb.textContent = "模型"; return; }
  const meta = app.models?.find((m) => m.id === (explicit ? app.turnOpts.model : def?.id));
  const effKey = (explicit && app.turnOpts.effort) || meta?.defaultEffort || null;
  mb.textContent = "";
  const main = document.createElement("span");
  main.textContent = shortModel(name);
  mb.appendChild(main);
  if (effKey) {
    const sub = document.createElement("span");
    sub.className = "msub";
    sub.textContent = " " + (EFFORT_ZH[effKey] ?? effKey);
    mb.appendChild(sub);
  }
}

// 静默预取模型列表：让模型胶囊在"跟随电脑配置"时也能显示默认模型号。
// 旧 daemon 没有 models.list，失败即算了（点开弹层时再给明确提示）
let modelsLoading = false;
async function prefetchModels() {
  if (app.models || modelsLoading || !app.session) return;
  modelsLoading = true;
  try {
    const r = await app.session.request("models.list", {});
    app.models = r.models ?? [];
    updateOptButtons();
  } catch { /* 忽略：胶囊维持占位 */ }
  finally { modelsLoading = false; }
}

function sheetRow(box, { title, sub, active, warn, icon, onclick }) {
  const row = document.createElement("div");
  row.className = "drow" + (active ? " active" : "");
  if (icon) {
    const ic = document.createElement("span");
    ic.className = "dico";
    ic.innerHTML = icon;
    if (warn) ic.style.color = "var(--err)";
    row.appendChild(ic);
  }
  const main = document.createElement("div");
  main.className = "dname";
  const t = document.createElement("div");
  t.textContent = title;
  if (warn) t.style.color = "var(--err)";
  main.appendChild(t);
  if (sub) {
    const d = document.createElement("div");
    d.className = "dsub wrap";
    d.textContent = sub;
    main.appendChild(d);
  }
  row.appendChild(main);
  if (active) {
    const cur = document.createElement("span");
    cur.className = "dcur";
    cur.textContent = "当前";
    row.appendChild(cur);
  }
  row.onclick = onclick;
  box.appendChild(row);
  return row;
}

function openPermSheet() {

  for (const p of PERM_PRESETS) {
    sheetRow(box, {
      title: p.name, sub: p.desc, warn: p.warn, icon: PERM_ICON[p.key],
      active: app.turnOpts.perm === p.key,
      onclick: () => {
        if (p.key === "full" && app.turnOpts.perm !== "full" &&
            !confirm("完全访问：之后从手机发出的消息将不经审批直接执行命令。确认你信任当前任务再切换。")) {
          return;
        }
        app.turnOpts.perm = p.key;

}

async function openModelSheet() {
  $("modelsheet").classList.add("open");
  const box = $("modellist");
  if (!app.models) {
    if (net.link !== "ok" || net.daemon === false) {
      $("modelsheet").classList.remove("open");

    box.innerHTML = '<div class="notice">读取模型列表…</div>';

      $("modelsheet").classList.remove("open");

function renderModelSheet() {
  const box = $("modellist");
  box.innerHTML = "";
  sheetRow(box, {
    title: "跟随电脑配置", sub: "使用电脑端当前默认的模型与推理力度",
    active: !app.turnOpts.model,
    onclick: () => {
      app.turnOpts.model = null;
      app.turnOpts.modelName = null;
      app.turnOpts.effort = null;

      updateOptButtons();
      $("modelsheet").classList.remove("open");
    },
  });
  for (const m of app.models) {
    sheetRow(box, {
      title: m.name, sub: m.description,
      active: app.turnOpts.model === m.id,
      onclick: () => { // 选模型即选中并关闭；力度取该模型默认值，重开弹层可在底部微调
        app.turnOpts.model = m.id;
        app.turnOpts.modelName = m.name;

        saveTurnOpts();

      if (selected) chip.classList.add("sel");
      chip.textContent = (EFFORT_ZH[e] ?? e) + (e === m.defaultEffort ? "（默认）" : "");
      chip.onclick = () => {

        saveTurnOpts();

        $("modelsheet").classList.remove("open");
