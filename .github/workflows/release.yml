name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify release version
        shell: pwsh
        run: |
          $package = Get-Content -Raw package.json | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($expectedTag -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package.json version $($package.version)."
          }

      - name: Test
        run: npm test

      - name: Build Windows installer
        run: npm run build:desktop:win

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist/desktop/windows/installer -Filter "CodexRemote-Setup-*.exe" | Select-Object -First 1
          if (!$installer) {
            throw "Windows installer was not generated."
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "path=$($installer.FullName)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "name=$($installer.Name)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.installer.outputs.name }}
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.installer.outputs.path }}" `
            --verify-tag `
            --title "Codex Remote ${{ github.ref_name }}" `
            --notes "Windows 安装包由 GitHub Actions 自动构建。"
